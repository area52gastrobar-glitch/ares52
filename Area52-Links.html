<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>ÁREA 52 Gastro Bar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200;300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --gold:#c9a84c;
  --gold2:#f0d080;
  --dark:#06050a;
}
body{
  background:var(--dark);
  font-family:'Oswald',sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:0 0 40px;
  position:relative;
  overflow-x:hidden;
}

/* BG collage */
.bg-collage{
  position:fixed;inset:0;z-index:0;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  opacity:.12;filter:saturate(.6);
}
.bg-collage div{background-size:cover;background-position:center;}

/* Gradient overlay */
.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:radial-gradient(ellipse at 50% 0%, rgba(201,168,76,.08) 0%, transparent 60%),
             linear-gradient(to bottom, rgba(6,5,10,.7) 0%, rgba(6,5,10,.85) 100%);
}

.wrap{
  position:relative;z-index:2;
  width:100%;max-width:480px;
  padding:40px 20px 20px;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

/* HEADER */
.logo-wrap{
  width:130px;height:130px;
  border-radius:50%;
  border:2px solid rgba(201,168,76,.4);
  overflow:hidden;
  box-shadow:0 0 40px rgba(201,168,76,.2);
  margin-bottom:14px;
  animation:popIn .6s cubic-bezier(.16,1,.3,1) forwards;
}
.logo-wrap img{width:100%;height:100%;object-fit:cover;}
@keyframes popIn{
  from{opacity:0;transform:scale(.7);}
  to{opacity:1;transform:scale(1);}
}

.name{
  font-family:'Bebas Neue',sans-serif;
  font-size:34px;letter-spacing:5px;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:fadeUp .5s .2s ease both;
}
.sub{
  font-weight:200;font-size:12px;letter-spacing:5px;
  color:rgba(201,168,76,.55);
  text-transform:uppercase;
  margin-top:2px;margin-bottom:6px;
  animation:fadeUp .5s .3s ease both;
}
.bio{
  font-weight:300;font-size:13px;letter-spacing:1px;
  color:rgba(255,255,255,.5);
  text-align:center;
  line-height:1.6;
  max-width:280px;
  margin-bottom:6px;
  animation:fadeUp .5s .4s ease both;
}

/* Gold rule */
.rule{
  width:50px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:14px 0 20px;
  animation:fadeUp .5s .5s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px);}
  to{opacity:1;transform:translateY(0);}
}

/* LINKS */
.links{
  width:100%;display:flex;flex-direction:column;gap:10px;
  animation:fadeUp .5s .5s ease both;
}

.link-btn{
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.18);
  border-radius:12px;
  padding:14px 18px;
  text-decoration:none;
  color:#fff;
  transition:all .2s;
  position:relative;
  overflow:hidden;
}
.link-btn::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.08),transparent);
  opacity:0;transition:opacity .2s;
}
.link-btn:hover{
  border-color:rgba(201,168,76,.45);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.link-btn:hover::before{opacity:1;}
.link-btn:active{transform:scale(.98);}

.link-icon{
  width:40px;height:40px;border-radius:9px;
  background:rgba(201,168,76,.12);
  border:1px solid rgba(201,168,76,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.link-text{flex:1;}
.link-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:15px;letter-spacing:2px;
  color:var(--gold2);
  display:block;
}
.link-desc{
  font-weight:300;font-size:11px;letter-spacing:1px;
  color:rgba(255,255,255,.45);
  display:block;margin-top:1px;
}
.link-arrow{
  color:rgba(201,168,76,.4);
  font-size:16px;flex-shrink:0;
}

/* Featured link (carta) */
.link-btn.featured{
  background:rgba(201,168,76,.1);
  border-color:rgba(201,168,76,.35);
}
.link-btn.featured .link-title{color:var(--gold2);}

/* Section label */
.section-label{
  font-size:9px;letter-spacing:4px;
  color:rgba(201,168,76,.3);
  text-transform:uppercase;
  align-self:flex-start;
  margin:14px 0 4px 4px;
}

/* QR section */
.qr-section{
  margin-top:24px;
  display:flex;flex-direction:column;align-items:center;
  gap:10px;
  padding:20px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(201,168,76,.15);
  border-radius:14px;
  width:100%;
  animation:fadeUp .5s .9s ease both;
}
.qr-section img{
  width:110px;height:110px;border-radius:8px;
  border:1px solid rgba(201,168,76,.3);
}
.qr-label{
  font-size:10px;letter-spacing:3px;
  color:rgba(201,168,76,.6);
  text-align:center;
}
.qr-sub{
  font-weight:300;font-size:11px;
  color:rgba(255,255,255,.35);
  text-align:center;letter-spacing:1px;
}

/* Footer */
.footer{
  margin-top:28px;
  text-align:center;
  color:rgba(201,168,76,.25);
  font-size:10px;letter-spacing:3px;
  animation:fadeUp .5s 1s ease both;
}
.footer b{color:rgba(201,168,76,.45);font-weight:400;}

/* Socials row */
.socials{
  display:flex;gap:12px;margin-top:16px;
  animation:fadeUp .5s .85s ease both;
}
.soc-btn{
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(201,168,76,.2);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;font-size:18px;
  transition:all .2s;color:#fff;
}
.soc-btn:hover{background:rgba(201,168,76,.15);border-color:rgba(201,168,76,.4);transform:scale(1.1);}
</style>
</head>
