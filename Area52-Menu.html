<style>
:root{
  --bg:#111009;
  --card:#1a1810;
  --gold:#f0c040;
  --red:#e03030;
  --blue:#3a8fd4;
  --white:#f0ece0;
  --muted:#888070;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0908;font-family:"Lato",sans-serif;min-height:100vh;}

/* ── CHROME ── */
.chrome{max-width:900px;margin:0 auto;padding:16px;}
.toolbar{
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
  background:#1a1810;border:1px solid #3a3020;border-radius:10px;
  padding:10px 14px;margin-bottom:12px;
}
.toolbar-title{color:var(--gold);font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:3px;}
.tbtn{
  padding:8px 18px;border-radius:6px;font-family:"Oswald",sans-serif;
  font-size:12px;letter-spacing:2px;cursor:pointer;transition:.15s;border:none;
}
.tbtn-outline{background:transparent;border:1px solid var(--gold);color:var(--gold);}
.tbtn-outline:hover{background:var(--gold);color:#000;}
.tbtn-solid{background:var(--gold);color:#000;font-weight:600;}
.tbtn-solid:hover{background:#ffd060;}
.opts{
  display:flex;gap:8px;flex-wrap:wrap;
  background:#1a1810;border:1px solid #2a2010;border-radius:10px;
  padding:10px 14px;margin-bottom:12px;align-items:flex-end;
}
.opt-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:100px;}
.opt-group label{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.opt-group select,.opt-group input[type=text]{
  background:#0d0c08;color:var(--white);border:1px solid #333;
  border-radius:5px;padding:6px 8px;font-family:"Lato",sans-serif;font-size:12px;
}
.opt-group input[type=color]{height:30px;padding:2px;border-radius:5px;cursor:pointer;}
#status{color:var(--muted);font-size:11px;padding:6px 0 10px;letter-spacing:1px;}

/* ── DOCUMENT ── */
#doc{border-radius:8px;overflow:hidden;}

/* Cover */
.cover{
  background:var(--bg);
  padding:16px 32px 14px;
  text-align:center;
  position:relative;
  border-bottom:3px solid var(--gold);
}
/* Texture overlay */
.cover::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(240,192,64,.08) 0%,transparent 60%);
  pointer-events:none;
}

.cover-tag{
  font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:8px;
  color:var(--gold);margin-bottom:8px;
}
.cover-title{
  font-family:"Bebas Neue",sans-serif;font-size:72px;letter-spacing:6px;
  color:var(--white);line-height:1;
  text-shadow:0 0 40px rgba(240,192,64,.3);
}
.cover-title span{color:var(--gold);}
.cover-sub{
  font-family:"Oswald",sans-serif;font-weight:300;font-size:18px;
  letter-spacing:10px;color:var(--muted);margin-top:6px;
  text-transform:uppercase;
}
.cover-divider{
  display:flex;align-items:center;gap:12px;justify-content:center;
  margin:16px auto;max-width:300px;
}
.cover-divider-line{flex:1;height:1px;background:var(--gold);opacity:.4;}
.cover-divider-icon{color:var(--gold);font-size:18px;}
.cover-tagline{
  font-family:"Lato",sans-serif;font-weight:300;font-size:14px;
  color:var(--muted);letter-spacing:2px;text-transform:uppercase;
}

/* Menu pages */

  background:var(--bg);
  position:relative;
  overflow:hidden;
}

/* Cliente mode - hide all controls */
body.cliente-mode .toolbar,
body.cliente-mode .opts,
body.cliente-mode #status{
  display:none !important;
}
body.cliente-mode .chrome{
  padding:0;
  max-width:100%;
}
body.cliente-mode #doc{
  border-radius:0;
  min-height:100vh;
}

@media print{
  .mode-sin-fondo .cover{background:#0c0b09 !important;}
  .mode-sin-fondo .menu-pages{background:var(--bg) !important;}
}
.cat-section{position:relative;}
.cat-divider{
  display:flex;align-items:center;justify-content:center;
  gap:16px;padding:6px 28px;opacity:0.12;
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
.cat-divider svg{fill:#f0c040;flex-shrink:0;}

/* Category */
.cat-section{
  padding:10px 24px 2px;
  position:relative;
}
.cat-section+.cat-section{
  border-top:1px solid rgba(240,192,64,.15);
}

.cat-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:6px;
}
.cat-emoji{
  font-size:36px;flex-shrink:0;
  filter:drop-shadow(0 0 8px rgba(255,255,255,.2));
}
.cat-title{
  font-family:"Bebas Neue",sans-serif;
  font-size:30px;letter-spacing:2px;
  line-height:1;
}
.cat-count{
  font-family:"Oswald",sans-serif;font-weight:300;
  font-size:12px;letter-spacing:2px;color:var(--muted);
  border:1px solid #333;border-radius:99px;
  padding:3px 10px;white-space:nowrap;
}
.cat-line{flex:1;height:1px;background:linear-gradient(90deg,currentColor,transparent);opacity:.3;}

/* Items grid */
.items-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:0 24px;
  margin-bottom:8px;
}
.menu-item{
  display:flex;align-items:baseline;gap:6px;
  padding:4px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.item-emoji{font-size:15px;flex-shrink:0;}
.item-name{
  font-family:"Oswald",sans-serif;font-weight:400;
  font-size:14px;color:var(--white);flex:1;letter-spacing:.3px;
}
.item-dots{
  flex:1;border-bottom:1px dotted rgba(255,255,255,.15);
  align-self:baseline;position:relative;top:-3px;min-width:8px;
}
.item-price{
  font-family:"Bebas Neue",sans-serif;font-size:16px;
  letter-spacing:1px;white-space:nowrap;flex-shrink:0;
}
.item-cubeta{
  display:block;font-family:"Lato",sans-serif;font-weight:300;
  font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:1px;
}

/* Footer */
.menu-footer{
  background:#0a0908;border-top:3px solid var(--gold);
  padding:24px 36px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:16px;
}
.footer-contact{display:flex;flex-direction:column;gap:5px;}
.footer-contact span{
  font-family:"Oswald",sans-serif;font-weight:300;
  font-size:12px;letter-spacing:2px;color:var(--muted);
  display:flex;align-items:center;gap:8px;
}
.footer-contact b{color:var(--gold);font-weight:400;}
.footer-brand{
  font-family:"Bebas Neue",sans-serif;font-size:36px;letter-spacing:4px;
  color:var(--gold);opacity:.3;
}

/* Happy hour badge */
.happy-hour{
  display:inline-block;
  background:var(--red);color:#fff;
  font-family:"Bebas Neue",sans-serif;font-size:12px;letter-spacing:2px;
  padding:3px 10px;border-radius:4px;margin-left:8px;vertical-align:middle;
}

@media print{
  @page{margin:8mm;}

<script>

// Category colors cycling: gold, red, blue, gold...
var CAT_COLORS=["#f0c040","#e03030","#3a8fd4","#f0c040","#50c878","#e07820","#3a8fd4","#e03030"];


var CAT_EMOJI_MAP = {
  'Agua': '💧',
  'Alitas': '🍗',
  'Burritos': '🌯',
  'COCTELES': '🍹',
  'Cafe': '☕',
  'Carnes': '🥩',
  'Cerveza 3 cordilleras': '🍺',
  'Cerveza Importada': '🍻',
  'Cerveza Nacional': '🍺',
  'Comida': '🍽️',
  'Energizantes': '⚡',
  'Entradas': '🍟',
  'Gaseosas': '🥤',
  'JUGOS': '🧃',
  'Lasagna': '🍝',
  'Licores 1/2': '🥃',
  'Licores Litro': '🍾',
  'PIZZA': '🍕',
  'Smirnoff': '🍸',
  'Whisky': '🥃',
  'cigarrillo': '🚬',
  'otros': '🍹',
  'tequila': '🥃',
};

function getCatEmoji(cat) {
  // Exact match first
  if (CAT_EMOJI_MAP[cat]) return CAT_EMOJI_MAP[cat];
  // Case-insensitive match
  var cl = cat.toLowerCase();
  for (var k in CAT_EMOJI_MAP) {
    if (k.toLowerCase() === cl) return CAT_EMOJI_MAP[k];
  }
  // Partial match
  for (var k in CAT_EMOJI_MAP) {
    if (cl.indexOf(k.toLowerCase()) >= 0 || k.toLowerCase().indexOf(cl) >= 0)
      return CAT_EMOJI_MAP[k];
  }
  return '🍽️';
}
function imprimirConFondo(){
  document.getElementById('doc').classList.remove('mode-sin-fondo');
  document.getElementById('doc').classList.add('mode-con-fondo');
  setTimeout(function(){window.print();},200);
}
function imprimirSinFondo(){
  document.getElementById('doc').classList.remove('mode-con-fondo');
  document.getElementById('doc').classList.add('mode-sin-fondo');
  setTimeout(function(){window.print();},200);
}

var db=firebase.database();
var menuData=[];

function fmt(n){return "$"+Number(n).toLocaleString("es-CO");}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// Check if in cliente mode
(function(){
  if(window.location.search.indexOf('cliente=1')>=0){
    document.body.classList.add('cliente-mode');
    // Auto-activate dark background for customers
    document.addEventListener('DOMContentLoaded',function(){
      var doc=document.getElementById('doc');
      if(doc) doc.classList.add('mode-con-fondo');
    });
  }
})();

function recargar(){
  document.getElementById("status").textContent="⏳ Cargando carta desde Firebase...";
  db.ref("menu").on("value",function(snap){
    var v=snap.val();
    if(!v){document.getElementById("status").textContent="Sin carta.";return;}
    menuData=Object.values(v).filter(function(m){return m&&m.nombre;});
    menuData.sort(function(a,b){return(a.cat||"").localeCompare(b.cat||"")||(a.nombre||"").localeCompare(b.nombre||"");});
    document.getElementById("status").textContent="✓ "+menuData.length+" productos listos";
    regenerar();
  },function(e){document.getElementById("status").textContent="Error: "+e.message;});
}

function regenerar(){
  if(!menuData.length)return;
  var showPrice=document.getElementById("cfg-precios").value!=="no";
  var showCubeta=document.getElementById("cfg-cubeta").value!=="no";
  var tagline=document.getElementById("cfg-tagline").value;

  // Group by category
  var cats={};
  menuData.forEach(function(p){var c=p.cat||"Otros";if(!cats[c])cats[c]=[];cats[c].push(p);});
  var catNames=Object.keys(cats).sort();

  // Adjust logo SVG colors to gold
  var logoSvg=LOGO_SVG;

  var sections=catNames.map(function(cat,i){
    var color=CAT_COLORS[i%CAT_COLORS.length];
    var count=cats[cat].length;
    var items=cats[cat].map(function(p){
      var cubHtml=(showCubeta&&p.esCerveza&&p.cubeta)
        ?'<span class="item-cubeta">🪣 CUBETAZO '+fmt(p.cubeta)+"</span>":"";
      return'<div class="menu-item">'
        +'<span class="item-emoji">'+(p.emoji||"·")+"</span>"
        +'<div style="flex:1">'
        +'<span class="item-name">'+esc(p.nombre)+"</span>"
        +(p.descripcion?'<div style="font-size:10px;color:#777;font-style:italic;margin-top:1px;line-height:1.3">'+esc(p.descripcion)+'</div>':'')
        +"</div>"
        +(showPrice
          ?'<span class="item-dots"></span>'
           +'<div style="text-align:right;flex-shrink:0">'
             +'<span class="item-price" style="color:'+color+'">'+fmt(p.precio)+"</span>"
             +cubHtml
           +"</div>"
          :"")
        +"</div>";
    }).join("");

    var catEmoji=getCatEmoji(cat);
    var icon_div='<span style="font-size:18px;opacity:.8">'+catEmoji+'</span>';
    return'<div class="cat-section">'
      +'<div class="cat-header" style="color:'+color+'">'
        +'<div class="cat-emoji">'+catEmoji+'</div>'
        +'<div class="cat-title">'+esc(cat.toUpperCase())+'</div>'
        +'<div class="cat-count" style="border-color:'+color+'44;color:'+color+'">'+count+'</div>'
        +'<div class="cat-line" style="border-color:'+color+'"></div>'
      +"</div>"
      +'<div class="items-grid">'+items+"</div>"
      +'<div class="cat-divider">'
        +'<svg width="40" height="2"><rect width="40" height="2" fill="#f0c040"/></svg>'
        +icon_div
        +'<svg width="40" height="2"><rect width="40" height="2" fill="#f0c040"/></svg>'
      +"</div>"
      +"</div>";
  }).join("");

  if(window.location.search.indexOf('cliente=1')>=0){
    document.getElementById('doc').classList.add('mode-con-fondo');
  }
  document.getElementById("doc").innerHTML=
    // Cover
    '<div class="cover">'

      +'<div style="font-size:22px;letter-spacing:12px;color:rgba(240,192,64,.5);margin-bottom:8px">✦ ✦ ✦</div>'
      +'<div class="cover-tag">Bogotá · Colombia</div>'
      +'<div class="cover-title">ÁREA <span>52</span></div>'
      +'<div class="cover-sub">Gastro Bar</div>'
      +'<div class="cover-divider">'
        +'<div class="cover-divider-line"></div>'
        +'<div class="cover-divider-icon">✦</div>'
        +'<div class="cover-divider-line"></div>'
      +"</div>"
      +(tagline?'<div class="cover-tagline">'+esc(tagline)+"</div>":"")
      +'<div style="-webkit-print-color-adjust:exact;print-color-adjust:exact;display:flex;justify-content:center;gap:24px;margin-top:20px;opacity:0.15">'
        +'<svg width="40" height="55" viewBox="0 0 80 200" fill="#f0c040"><path d="M30 10 L30 35 Q15 50 15 70 L15 175 Q15 185 25 185 L55 185 Q65 185 65 175 L65 70 Q65 50 50 35 L50 10 Z"/><rect x="28" y="5" width="24" height="8" rx="3"/></svg>'
        +'<svg width="35" height="55" viewBox="0 0 100 180" fill="#f0c040"><path d="M30 10 Q50 10 70 10 Q75 50 60 80 Q55 90 50 95 L50 155 Q65 155 65 165 L35 165 Q35 155 50 155 L50 95 Q45 90 40 80 Q25 50 30 10 Z"/></svg>'
        +'<svg width="40" height="45" viewBox="0 0 120 160" fill="#f0c040"><path d="M10 15 L60 85 L110 15 Z"/><line x1="60" y1="85" x2="60" y2="140" stroke="#f0c040" stroke-width="4"/><ellipse cx="60" cy="142" rx="25" ry="5"/></svg>'
        +'<svg width="35" height="55" viewBox="0 0 80 200" fill="#f0c040"><path d="M30 10 L30 35 Q15 50 15 70 L15 175 Q15 185 25 185 L55 185 Q65 185 65 175 L65 70 Q65 50 50 35 L50 10 Z"/><rect x="28" y="5" width="24" height="8" rx="3"/></svg>'
        +'<svg width="40" height="45" viewBox="0 0 140 110" fill="#f0c040"><path d="M15 35 Q15 10 70 10 Q125 10 125 35 L125 42 L15 42 Z"/><rect x="12" y="42" width="116" height="12" rx="2" opacity=".7"/><rect x="10" y="78" width="120" height="20" rx="10"/></svg>'
      +'</div>'
    +"</div>"
    // Sections
    +'<div class="menu-pages">'
      
      +sections+"</div>" 
    // Footer
    +'<div class="menu-footer">'
      +'<div class="footer-contact">'
        +'<span><b>📍</b> Calle 53 # 85H – 10, Bogotá</span>'
        +'<span><b>📞</b> 3204280700 &nbsp;·&nbsp; 3015162278</span>'
        +'<span><b>📧</b> Area52.gastrobar@gmail.com</span>'
        +'<span><b>📸</b> @area52.gastrobar</span>'
      +"</div>"
      +'<div class="footer-brand">ÁREA 52</div>'
    +"</div>";
}

recargar();
</script>
</body>
