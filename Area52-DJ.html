<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Área 52 · DJ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#fff;min-height:100vh}
.top{display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.08)}
.top img{width:42px;height:42px;border-radius:50%}
.top h1{font-size:18px;font-weight:900;letter-spacing:1px;background:linear-gradient(90deg,#c4973a,#f5d676);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.layout{display:grid;grid-template-columns:1fr 380px;gap:0;height:calc(100vh - 67px)}
@media(max-width:880px){.layout{grid-template-columns:1fr;height:auto}}
.player-side{padding:18px;display:flex;flex-direction:column;gap:14px}
.player-box{background:#000;border-radius:16px;overflow:hidden;aspect-ratio:16/9;width:100%}
.now{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px}
.now .lbl{color:#c4973a;font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase}
.now .t{font-size:20px;font-weight:800;margin-top:4px}
.now .a{color:#999;font-size:14px}
.controls{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.ctrl{flex:1;min-width:90px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer}
.ctrl.play{background:linear-gradient(90deg,#c4973a,#e0b052);color:#1a1208;border:none}
.ctrl:active{transform:scale(.97)}
.queue-side{background:rgba(0,0,0,.3);border-left:1px solid rgba(255,255,255,.08);padding:18px;overflow-y:auto}
.qt{font-size:13px;font-weight:800;color:#c4973a;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.genre-group{margin-bottom:16px}
.genre-head{display:flex;align-items:center;gap:8px;background:#c4973a18;border-radius:8px;padding:7px 12px;margin-bottom:8px}
.genre-head .g{color:#c4973a;font-weight:800;font-size:13px}
.genre-head .c{color:#888;font-size:11px;margin-left:auto}
.qsong{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.qsong.current{border-color:#c4973a;background:#c4973a14}
.qsong .info{flex:1;min-width:0}
.qsong .nm{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qsong .ar{font-size:11px;color:#999}
.qsong .by{font-size:10px;color:#c4973a}
.qsong button{background:#ef444418;color:#ef4444;border:none;border-radius:7px;width:30px;height:30px;cursor:pointer;flex-shrink:0}
.qsong .play-now{background:#22c55e18;color:#22c55e}
.empty{text-align:center;color:#666;padding:40px 10px}
.setup{background:#f5a62318;border:1px solid #f5a62344;border-radius:12px;padding:16px;margin:18px;color:#f5d676;font-size:13px;line-height:1.6}
.setup input{width:100%;background:rgba(0,0,0,.3);border:1px solid #f5a62344;border-radius:8px;padding:10px;color:#fff;margin:8px 0;font-size:14px}
.setup button{background:#f5a623;color:#1a1208;border:none;border-radius:8px;padding:10px 18px;font-weight:800;cursor:pointer}
.badge{font-size:9px;font-weight:800;padding:1px 7px;border-radius:99px;background:#c4973a22;color:#c4973a}
</style>
</head>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
var firebaseConfig={apiKey:"AIzaSyDbAU2pyYucDTBtm6TIxCfgkyzmnhYvJBU",authDomain:"area52bar-a36aa.firebaseapp.com",databaseURL:"https://area52bar-a36aa-default-rtdb.firebaseio.com",projectId:"area52bar-a36aa",storageBucket:"area52bar-a36aa.firebasestorage.app",messagingSenderId:"79314921682",appId:"1:79314921682:web:abfa44eefbd0df7441250b"};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();

// Orden de prioridad de géneros (para agrupar la cola)
var GENRE_ORDER=['Reggaetón','Crossover','Salsa','Vallenato','Pop','Rock','Electrónica','Popular','Otro'];

var YT_API_KEY=localStorage.getItem('a52_ytkey')||'';
var player=null, playerReady=false;
var pedidos=[];
var actual=null;  // pedido sonando
var videoCache={};  // {key: videoId}

// ---------- SETUP API KEY ----------
function renderSetup(){
  var s=document.getElementById('setupScreen');
  if(YT_API_KEY){s.innerHTML='';document.getElementById('mainLayout').style.display='';iniciarPlayer();return;}
  s.innerHTML='<div class="setup"><b>🔑 Configuración inicial (una sola vez)</b><br>'
    +'Para que el DJ busque y reproduzca las canciones necesitas una API Key gratuita de YouTube (Google Cloud → YouTube Data API v3).<br>'
    +'<input id="keyInput" placeholder="Pega aquí tu YouTube API Key">'
    +'<button onclick="guardarKey()">Guardar y empezar</button></div>';
}
function guardarKey(){
  var k=document.getElementById('keyInput').value.trim();
  if(!k){alert('Pega la API key');return;}
  localStorage.setItem('a52_ytkey',k);YT_API_KEY=k;renderSetup();
}

// ---------- YOUTUBE PLAYER ----------
function iniciarPlayer(){
  if(window.YT&&window.YT.Player){crearPlayer();return;}
  var tag=document.createElement('script');tag.src="https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);
  window.onYouTubeIframeAPIReady=crearPlayer;
}
function crearPlayer(){
  player=new YT.Player('ytplayer',{
    height:'100%',width:'100%',
    playerVars:{autoplay:0,controls:1,rel:0,playsinline:1},
    events:{
      'onReady':function(){playerReady=true;reproducirCola();},
      'onStateChange':function(e){
        if(e.data===YT.PlayerState.ENDED){marcarYsiguiente();}
        actualizarBotonPlay();
      }
    }
  });
}
function actualizarBotonPlay(){
  if(!player||!player.getPlayerState)return;
  var st=player.getPlayerState();
  var b=document.getElementById('btnPlayPause');
  b.innerHTML=(st===YT.PlayerState.PLAYING)?'⏸ Pausa':'▶ Reproducir';
}
function togglePlay(){
  if(!player)return;
  var st=player.getPlayerState();
  if(st===YT.PlayerState.PLAYING)player.pauseVideo();else player.playVideo();
}

// ---------- COLA AGRUPADA POR GÉNERO ----------
function colaOrdenada(){
  // pendientes (no sonadas)
  var pend=pedidos.filter(function(p){return !p.played;});
  // Agrupar por género
  var grupos={};
  pend.forEach(function(p){var g=p.genero||'Otro';(grupos[g]=grupos[g]||[]).push(p);});
  // Ordenar cada grupo por ts
  Object.keys(grupos).forEach(function(g){grupos[g].sort(function(a,b){return a.ts-b.ts;});});
  // Si hay algo sonando, su género va primero (para no cortar el bloque)
  var orden=GENRE_ORDER.slice();
  if(actual&&actual.genero){
    orden=orden.filter(function(g){return g!==actual.genero;});
    orden.unshift(actual.genero);
  } else {
    // el género con la canción más antigua va primero
    orden.sort(function(a,b){
      var ta=grupos[a]&&grupos[a][0]?grupos[a][0].ts:Infinity;
      var tb=grupos[b]&&grupos[b][0]?grupos[b][0].ts:Infinity;
      return ta-tb;
    });
  }
  var resultado=[];
  orden.forEach(function(g){if(grupos[g])resultado=resultado.concat(grupos[g]);});
  return resultado;
}

// ---------- BÚSQUEDA YOUTUBE ----------
function buscarVideo(pedido,cb){
  if(videoCache[pedido.key]){cb(videoCache[pedido.key]);return;}
  var q=encodeURIComponent((pedido.cancion||'')+' '+(pedido.artista||''));
  var url='https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&maxResults=1&q='+q+'&key='+YT_API_KEY;
  fetch(url).then(function(r){return r.json();}).then(function(data){
    if(data.items&&data.items.length){
      var vid=data.items[0].id.videoId;
      videoCache[pedido.key]=vid;cb(vid);
    } else { cb(null); }
  }).catch(function(){cb(null);});
}

// ---------- REPRODUCCIÓN ----------
function reproducirCola(){
  if(!playerReady)return;
  var cola=colaOrdenada();
  if(actual&&!actual.played){
    // ya hay algo sonando, no reiniciar
    return;
  }
  if(!cola.length){document.getElementById('nowTitle').textContent='Cola vacía';document.getElementById('nowArtist').textContent='';return;}
  reproducirPedido(cola[0]);
}
function reproducirPedido(pedido){
  actual=pedido;
  document.getElementById('nowTitle').textContent=pedido.cancion;
  document.getElementById('nowArtist').textContent=(pedido.artista||'')+(pedido.genero?'  ·  '+pedido.genero:'');
  buscarVideo(pedido,function(vid){
    if(vid&&player&&player.loadVideoById){player.loadVideoById(vid);player.playVideo();}
    else{document.getElementById('nowTitle').textContent='⚠️ No encontrada: '+pedido.cancion;setTimeout(marcarYsiguiente,2000);}
  });
  render();
}
function marcarYsiguiente(){
  if(actual&&actual.key)db.ref('musica/'+actual.key+'/played').set(true);
  actual=null;
  setTimeout(function(){reproducirCola();},600);
}
function siguiente(){marcarYsiguiente();}

function quitar(key){db.ref('musica/'+key).remove();}
function reproducirYa(key){
  var p=pedidos.find(function(x){return x.key===key;});
  if(p)reproducirPedido(p);
}

// ---------- RENDER COLA ----------
function render(){
  var cont=document.getElementById('colaLista');
  var cola=colaOrdenada();
  if(!cola.length&&!actual){cont.innerHTML='<div class="empty">🎵 No hay canciones en la cola</div>';return;}
  // Agrupar visualmente por género respetando el orden
  var html='';
  var lastG=null;
  cola.forEach(function(p){
    if(p.genero!==lastG){
      var n=cola.filter(function(x){return x.genero===p.genero;}).length;
      html+='<div class="genre-head"><span class="g">'+esc(p.genero||'Otro')+'</span><span class="c">'+n+' '+(n===1?'canción':'canciones')+'</span></div>';
      lastG=p.genero;
    }
    var esActual=actual&&actual.key===p.key;
    html+='<div class="qsong'+(esActual?' current':'')+'">'
      +'<div class="info"><div class="nm">'+(esActual?'▶ ':'')+esc(p.cancion)+'</div>'
      +(p.artista?'<div class="ar">'+esc(p.artista)+'</div>':'')
      +(p.nombre?'<div class="by">🙋 '+esc(p.nombre)+'</div>':'')+'</div>'
      +'<button class="play-now" onclick="reproducirYa(\''+p.key+'\')" title="Reproducir ya">▶</button>'
      +'<button onclick="quitar(\''+p.key+'\')">✕</button>'
    +'</div>';
  });
  cont.innerHTML=html;
}

function esc(s){return String(s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

db.ref('musica').on('value',function(snap){
  var v=snap.val()||{};
  pedidos=Object.keys(v).map(function(k){var o=v[k];o.key=k;return o;}).sort(function(a,b){return a.ts-b.ts;});
  document.getElementById('estado').textContent='● '+pedidos.filter(function(p){return !p.played;}).length+' en cola';
  render();
  // Si no hay nada sonando y llegó algo, arrancar
  if(playerReady&&(!actual||actual.played))reproducirCola();
});

renderSetup();
</script>
</body>
</html>
