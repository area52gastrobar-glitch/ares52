<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--panel:#0d0d18;--card:#13131f;--card2:#181828;
  --border:#22223a;--accent:#a855f7;--gold:#f5a623;
  --green:#22c55e;--red:#ef4444;--blue:#38bdf8;--cyan:#06b6d4;
  --text:#e8e8f5;--muted:#55558a;--dim:#2a2a45;
}
body{background:var(--bg);color:var(--text);font-family:'Trebuchet MS',sans-serif;min-height:100vh}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:99px}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--card2);border:1px solid #a855f733;border-radius:24px;padding:32px;width:370px;max-width:95vw;box-shadow:0 0 80px #a855f722}
.user-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.user-card:hover,.user-card.sel{border-color:var(--accent);background:#a855f712;box-shadow:0 0 12px #a855f733}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--dim);transition:background .15s}
.pin-dot.filled{background:var(--accent)}
.pin-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:20px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;width:100%}
.pin-btn:hover{background:var(--card2);border-color:var(--accent)}
.pin-btn:active{transform:scale(.93)}

/* ── LAYOUT ── */
#header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 18px;display:none;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
#tabs{background:var(--panel);border-bottom:1px solid var(--border);display:none;overflow-x:auto}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;padding:11px 18px;font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap;cursor:pointer;transition:all .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
#content{padding:14px 18px;max-width:1340px;margin:0 auto}

/* ── LOGO ── */
.logo-title{font-weight:900;font-size:20px;background:linear-gradient(90deg,#a855f7,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;text-transform:uppercase;line-height:1}
.logo-sub{color:var(--muted);font-size:9px;letter-spacing:3px;text-transform:uppercase;font-weight:600}

/* ── TAGS / PILLS ── */
.tag{border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700}
.pill{border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.pill.active{border-color:var(--accent);background:#a855f722;color:var(--accent)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 0 12px #a855f744}
.btn-green{background:var(--green);color:#000;box-shadow:0 0 10px #22c55e44}
.btn-blue{background:var(--blue);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-gold{background:var(--gold);color:#000;box-shadow:0 0 10px #f5a62344}
.btn-dark{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.btn-outline{background:transparent;border:1.5px solid var(--muted);color:var(--muted)}
.btn:disabled{background:var(--dim);color:var(--muted);cursor:not-allowed;opacity:.5;box-shadow:none}

/* ── INPUTS ── */
.inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:5px 9px;font-size:12px}
select.inp{cursor:pointer}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px)}
.modal-box{background:var(--card2);border:1px solid #a855f744;border-radius:20px;padding:26px;width:420px;max-width:95vw;box-shadow:0 0 60px #a855f722;max-height:90vh;overflow-y:auto}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px}
.section-title{color:var(--muted);font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}

/* ── MAPA ── */
#mapa-wrap{position:relative;background:var(--bg);border-radius:14px;height:430px;user-select:none;overflow:hidden;border:1px solid var(--border)}
.mesa-node{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;transition:box-shadow .2s;cursor:pointer}

/* ── PEDIDO ── */
.carta-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;overflow-y:auto;max-height:200px}
.carta-item{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 9px;cursor:pointer;transition:border-color .15s}
.carta-item:hover{border-color:var(--accent)}

/* ── INVENTARIO ── */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.inv-bar{height:4px;background:var(--dim);border-radius:99px;margin-bottom:8px}
.inv-fill{height:100%;border-radius:99px;transition:width .3s}

/* ── VENTAS / CAJA ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.full-col{grid-column:1/-1}

/* ── GASTOS ── */
.gasto-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);gap:8px}

/* ── CIERRE ── */
.cierre-card{background:var(--card);border:2px solid var(--gold);border-radius:14px;padding:18px;margin-bottom:14px}
.cierre-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.cierre-total{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:18px;font-weight:900}

/* ── HISTORIAL CIERRES ── */
.cierre-hist-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.cierre-hist-item:hover{border-color:var(--gold)}

/* ── ADMIN ── */
.user-row-admin{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.forma-btn{flex:1;background:transparent;border:2px solid var(--border);border-radius:10px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.forma-btn.sel{border-color:var(--accent);background:#a855f720}
.ori-btn{flex:1;background:transparent;border:2px solid var(--border);border-radius:9px;padding:7px 4px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted)}
.ori-btn.sel{border-color:var(--blue);background:#38bdf820;color:var(--blue)}

/* ── EMOJI PICKER ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px}
.emj-btn{font-size:22px;background:transparent;border:2px solid transparent;border-radius:8px;cursor:pointer;padding:4px;transition:all .15s;line-height:1}
.emj-btn:hover{background:#a855f720}
.emj-btn.sel{background:#a855f722;border-color:var(--accent)}

/* ── SYNC ── */
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MISC ── */
.alert-box{border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px}
.alert-red{background:#ef444418;border:1px solid #ef444444;color:#ef4444}
.alert-green{background:#22c55e14;border:1px solid #22c55e33;color:#22c55e}
.alert-blue{background:#38bdf814;border:1px solid #38bdf833;color:#38bdf8}
.alert-gold{background:#f5a62314;border:1px solid #f5a62333;color:#f5a623}
.zona-btn{border-radius:10px;padding:7px 15px;font-weight:800;font-size:13px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 375px;gap:12px}
.grid1{display:grid;grid-template-columns:1fr}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb4{margin-bottom:4px}
.cat-title{color:var(--muted);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:5px;margin-top:14px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;gap:10px;transition:border-color .15s}
.prod-card:hover{border-color:var(--accent)}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
</style>
</head>

}

/* ═══════════════ UTILS ═══════════════ */
function zonaKey(z){ return z==='antejardín'?'antejardIn':z; }
var fmt=function(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);};
var fmtDate=function(ts){return new Date(ts).toLocaleDateString('es-CO');};
var fmtTime=function(ts){return new Date(ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});};
var fmtDT=function(ts){return fmtDate(ts)+' '+fmtTime(ts);};
function todayStr(){return new Date().toLocaleDateString('es-CO');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function precioItem(it){
  if(it.isCombo) return it.comboPrecio||0;
  if(it.isCustom) return it.customPrecio||0;
  var p=menu.find(function(m){return m.id===it.pid;});if(!p)return 0;return it.cubeta?(p.cubeta||p.precio*5):p.precio;
}
function totalPedido(mid){return(pedidos[mid]||[]).reduce(function(a,it){return a+precioItem(it)*it.qty;},0);}
function totalVentasHoy(){return ventas.filter(function(v){return fmtDate(v.ts)===todayStr();}).reduce(function(a,v){return a+v.total;},0);}
function totalGastosHoy(){return gastos.filter(function(g){return fmtDate(g.ts)===todayStr();}).reduce(function(a,g){return a+g.valor;},0);}

/* ═══════════════ SYNC ═══════════════ */
function iniciarSync(){
  if(!getDb()){
    console.warn('Sin Firebase - modo local');
    // Update sync indicator to show offline
    var dot=document.getElementById('sync-dot');
    if(dot){dot.style.background='#f5a623';dot.title='Modo local - sin sincronización';}
    return;
  }
  var dot=document.getElementById('sync-dot');
  if(dot){dot.style.background='#22c55e';dot.title='Conectado a Firebase';}
  fbOn('pedidos',function(v){
    pedidos=v||{};
    Object.keys(pedidos).forEach(function(k){if(!Array.isArray(pedidos[k]))pedidos[k]=[];});
    renderSoloPedido();updateHeader();actualizarColorMesas();
  });
  fbOn('ventas',function(v){ventas=v?Object.values(v):[];updateHeader();if(tabActual==='ventas'||tabActual==='caja')render();});
  fbOn('gastos',function(v){gastos=v?Object.values(v):[];if(tabActual==='gastos'||tabActual==='caja')render();});
  fbOn('menu',function(v){if(v)menu=Object.values(v);if(tabActual==='carta'||tabActual==='inventario')render();});
  fbOn('mesas',function(v){if(v)mesas=Object.values(v);if(tabActual==='mesas')render();});
  fbOn('paredes',function(v){
    if(v){
      // Normalize: Firebase might return antejardIn or antejardín
      paredesData={antejardIn:[],piso1:[],piso2:[]};
      if(v.antejardIn)paredesData.antejardIn=v.antejardIn;
      if(v['antejardín'])paredesData.antejardIn=v['antejardín'];
      if(v.piso1)paredesData.piso1=v.piso1;
      if(v.piso2)paredesData.piso2=v.piso2;
    }
    if(tabActual==='mesas')render();
  });
  fbOn('combos',function(v){combos=v?Object.values(v):[];if(tabActual==='combos'||tabActual==='mesas')render();});
  fbOn('cierres',function(v){cierres=v?Object.values(v):[];if(tabActual==='caja')render();});
  fbOn('cajaHoy',function(v){if(v)cajaHoy=v;if(tabActual==='caja')render();});
}

function selUsuario(id){
  usuarioSelLogin=usuarios.find(function(u){return u.id===id;});

  document.getElementById('login-step-user').style.display='none';
  document.getElementById('login-step-pin').style.display='block';
  document.getElementById('pin-username').textContent=usuarioSelLogin.emoji+' '+usuarioSelLogin.nombre;
  pinBuffer='';renderPinDots();renderPinKeypad();
}
function backToUsers(){
  usuarioSelLogin=null;pinBuffer='';
  document.getElementById('login-step-user').style.display='block';
  document.getElementById('login-step-pin').style.display='none';
  document.getElementById('pin-err').textContent='';
}
function renderPinDots(){
  var c=document.getElementById('pin-dots');
  if(!c)return;
  c.innerHTML=Array.from({length:4},function(_,i){
    return '<div class="pin-dot'+(i<pinBuffer.length?' filled':'')+'"></div>';
  }).join('');
}
function renderPinKeypad(){
  var kp=document.getElementById('pin-keypad');
  if(!kp)return;
  var keys=['1','2','3','4','5','6','7','8','9','','0','DEL'];
  kp.innerHTML=keys.map(function(k){
    if(k==='')return '<div></div>';
    return '<button class="pin-btn" onclick="pinKey(\''+k+'\')">'+(k==='DEL'?'&#9003;':k)+'</button>';
  }).join('');
}
function pinKey(k){
  if(k==='DEL'){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return;}
  if(pinBuffer.length>=4)return;
  pinBuffer+=k;renderPinDots();
  if(pinBuffer.length===4)setTimeout(verificarPin,120);
}
function verificarPin(){
  if(!usuarioSelLogin){backToUsers();return;}
  if(pinBuffer===usuarioSelLogin.pin){
    usuarioActivo=usuarioSelLogin;
  window._usuarioActivoGlobal=usuarioActivo;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('header').style.display='flex';
    document.getElementById('tabs').style.display='flex';
    document.getElementById('h-emoji').textContent=usuarioActivo.emoji;
    document.getElementById('h-nombre').textContent=usuarioActivo.nombre;
    document.getElementById('h-rol').textContent=(ROLES[usuarioActivo.rol]||{}).label||usuarioActivo.rol;
    iniciarSync();
    tabActual=(ROLES[usuarioActivo.rol].tabs||['mesas'])[0];
    renderTabs();render();
  } else {
    document.getElementById('pin-err').textContent='PIN incorrecto';
    pinBuffer='';renderPinDots();
    setTimeout(function(){document.getElementById('pin-err').textContent='';},2000);
  }
}
function cerrarSesion(){
  if(getDb())['pedidos','ventas','gastos','menu','mesas','paredes','cierres','cajaHoy','combos'].forEach(fbOff);
  usuarioActivo=null;mesaActiva=null;tabActual='mesas';
  document.getElementById('header').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('content').innerHTML='';
  document.getElementById('login-screen').style.display='flex';
  pinBuffer='';usuarioSelLogin=null;
  document.getElementById('login-step-user').style.display='block';
  document.getElementById('login-step-pin').style.display='none';
  renderLogin();
}

/* ═══════════════ MAPA EVENTS ═══════════════ */
function bindMapaEvents(){
  var el=document.getElementById('mapa-wrap');
  if(!el)return;
  // Always remove old listeners by cloning the element
  var newEl=el.cloneNode(true);
  el.parentNode.replaceChild(newEl,el);
  el=newEl;

  // TOUCH: primary method for mobile
  el.addEventListener('touchend',function(e){
    var mn=e.target.closest('.mesa-node');
    if(!mn)return;
    e.preventDefault();
    var mid=parseInt(mn.getAttribute('data-mesaid'));
    if(modoEdicion){abrirEditorMesa(mid);return;}
    clickMesa(mid);
  });

  // CLICK: for desktop
  el.addEventListener('click',function(e){
    var mn=e.target.closest('.mesa-node');
    if(!mn)return;
    var mid=parseInt(mn.getAttribute('data-mesaid'));
    if(modoEdicion){abrirEditorMesa(mid);return;}
    clickMesa(mid);
  });

  el.addEventListener('mousedown',function(e){
    // Paredes drawing - only on non-mesa background
    if(modoParedes){
      if(e.target.closest('.mesa-node')||e.target.closest('#paredes-ui'))return;
      var r=el.getBoundingClientRect();
      _paredDibujando={x1:e.clientX-r.left,y1:e.clientY-r.top,x2:e.clientX-r.left,y2:e.clientY-r.top};
      e.preventDefault();return;
    }
    // Mesa drag (edit mode only)
    var mn=e.target.closest('.mesa-node');
    if(mn&&modoEdicion){
      var mid=parseInt(mn.getAttribute('data-mesaid'));
      dragState={id:mid,sx:e.clientX,sy:e.clientY};
      e.preventDefault();
    }
  });
  el.addEventListener('mousemove',function(e){
    if(modoParedes&&_paredDibujando){
      var r=el.getBoundingClientRect();
      _paredDibujando.x2=e.clientX-r.left;
      _paredDibujando.y2=e.clientY-r.top;
      // live preview - update last dashed line
      var svgs=el.querySelectorAll('svg');
      var last=svgs[svgs.length-1];
      if(last){var ls=last.querySelectorAll('line');var ll=ls[ls.length-1];if(ll&&ll.getAttribute('stroke-dasharray')){ll.setAttribute('x2',_paredDibujando.x2);ll.setAttribute('y2',_paredDibujando.y2);}}
      return;
    }
    if(dragState){
      var dx=e.clientX-dragState.sx,dy=e.clientY-dragState.sy;
      dragState.sx=e.clientX;dragState.sy=e.clientY;
      var m=mesas.find(function(m){return m.id===dragState.id;});
      if(m){m.x=Math.max(0,m.x+dx);m.y=Math.max(0,m.y+dy);}
      var node=document.getElementById('mn-'+dragState.id);
      if(node&&m){node.style.left=m.x+'px';node.style.top=m.y+'px';}
    }
  });
  el.addEventListener('mouseup',function(e){
    if(modoParedes&&_paredDibujando){
      var r=el.getBoundingClientRect();
      var x2=e.clientX-r.left,y2=e.clientY-r.top;
      var dx=x2-_paredDibujando.x1,dy=y2-_paredDibujando.y1;
      if(Math.sqrt(dx*dx+dy*dy)>10){
        var k2=zonaKey(zonaActual);
        if(!paredesData[k2])paredesData[k2]=[];
        paredesData[k2].push({x1:_paredDibujando.x1,y1:_paredDibujando.y1,x2:x2,y2:y2,color:_colorPared,grosor:_grosorPared});
        var rp=ref('paredes/'+k2);
        if(rp)rp.set(paredesData[k2]);else fbSet('paredes',paredesData);
      }
      _paredDibujando=null;render();return;
    }
    if(dragState){fbSet('mesas',mesasObj());dragState=null;}
  });
  el.addEventListener('mouseleave',function(){
    if(dragState){fbSet('mesas',mesasObj());dragState=null;}
    _paredDibujando=null;
  });

  // Touch support for mobile drag (edit mode)
  el.addEventListener('touchstart',function(e){
    var mn=e.target.closest('.mesa-node');
    if(mn&&modoEdicion){
      var t=e.touches[0];
      var mid=parseInt(mn.getAttribute('data-mesaid'));
      dragState={id:mid,sx:t.clientX,sy:t.clientY};
    }
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    if(!dragState)return;
    var t=e.touches[0];
    var dx=t.clientX-dragState.sx,dy=t.clientY-dragState.sy;
    dragState.sx=t.clientX;dragState.sy=t.clientY;
    var m=mesas.find(function(m){return m.id===dragState.id;});
    if(m){m.x=Math.max(0,m.x+dx);m.y=Math.max(0,m.y+dy);}
    var node=document.getElementById('mn-'+dragState.id);
    if(node&&m){node.style.left=m.x+'px';node.style.top=m.y+'px';}
    e.preventDefault();
  },{passive:false});
  el.addEventListener('touchend',function(){
    if(dragState){fbSet('mesas',mesasObj());dragState=null;}
  });
}




function mesasObj(){var o={};mesas.forEach(function(m){o[m.id]=m;});return o;}
function clickMesa(id){if(modoEdicion)return;if(modoParedes){modoParedes=false;}var m=mesas.find(function(m){return m.id===id;});mesaActiva=mesaActiva&&mesaActiva.id===id?null:m;catFiltroPed='Todos';render();}
function dblMesa(id){if(!modoEdicion)return;abrirEditorMesa(id);}
function cerrarPanel(){mesaActiva=null;render();}
function cambiarZona(z){zonaActual=z;mesaActiva=null;render();}
function toggleEdicion(){modoEdicion=!modoEdicion;modoParedes=false;mesaActiva=null;render();}
function toggleParedes(){modoParedes=!modoParedes;modoEdicion=false;mesaActiva=null;render();}
function selColorP(c){_colorPared=c;render();}
function selGrosorP(g){_grosorPared=g;render();}
function deshacerPared(){
  var k=zonaKey(zonaActual);
  var pa=paredesData[k];
  if(pa&&pa.length){
    pa.pop();
    var r=ref('paredes/'+k);
    var val=pa.length===0?null:pa;
    if(r){
      r.off();
      r.set(val).then(function(){
        r.on('value',function(s){paredesData[k]=s.val()||[];if(tabActual==='mesas')render();});
      }).catch(function(){fbSet('paredes',paredesData);});
    } else {
      fbSet('paredes',paredesData);
    }
  }
  render();}
function borrarParedes(){
  var k=zonaKey(zonaActual);
  paredesData[k]=[];
  var r=ref('paredes/'+k);
  if(r){
    // Temporarily disable the listener to avoid overwrite bounce
    r.off();
    r.set(null).then(function(){
      // Re-enable listener after save
      r.on('value',function(s){
        var val=s.val();
        paredesData[k]=val||[];
        if(tabActual==='mesas')render();
      });
    }).catch(function(){
      fbSet('paredes',paredesData);
    });
  }
  render();
}

/* ═══════════════ PEDIDOS ═══════════════ */
function agregarItem(pid,cubeta){
  if(!mesaActiva)return;
  var id=mesaActiva.id;
  if(!pedidos[id])pedidos[id]=[];
  var idx=pedidos[id].findIndex(function(it){return it.pid===pid&&it.cubeta===cubeta;});
  if(idx>=0)pedidos[id][idx].qty++;
  else pedidos[id].push({pid:pid,cubeta:cubeta,qty:1});
  var r=ref('pedidos/'+id);if(r)r.set(pedidos[id]);
  renderSoloPedido();updateHeader();actualizarColorMesas();
}
function quitarItem(pid,cubeta){
  if(!mesaActiva)return;
  var id=mesaActiva.id;
  var idx=(pedidos[id]||[]).findIndex(function(it){return it.pid===pid&&it.cubeta===cubeta;});
  if(idx<0)return;
  if(pedidos[id][idx].qty===1)pedidos[id].splice(idx,1);
  else pedidos[id][idx].qty--;
  var r=ref('pedidos/'+id);if(r)r.set(pedidos[id].length?pedidos[id]:null);
  renderSoloPedido();updateHeader();actualizarColorMesas();
}

/* ═══════════════ COBRO MODAL ═══════════════ */
function abrirCobro(){
  if(!mesaActiva)return;
  var ped=pedidos[mesaActiva.id]||[];
  var total=totalPedido(mesaActiva.id);
  var zona=ZONAS.find(function(z){return z.id===mesaActiva.zona;});

  // Estado del pago dividido
  window._pagosParciales={};  // {fpId: monto}
  window._totalCobro=total;

  function renderCobroModal(){
    var pagado=Object.values(window._pagosParciales).reduce(function(a,v){return a+(v||0);},0);
    var pendiente=total-pagado;
    var completo=Math.round(pendiente)<=0;

    var resumen=ped.map(function(it){
      var nombre,pr;
      if(it.isCustom){nombre='✏️ '+esc(it.customNombre);pr=it.customPrecio||0;}
      else if(it.isCombo){nombre='🎁 '+esc(it.comboNombre);pr=it.comboPrecio||0;}
      else{var p=menu.find(function(m){return m.id===it.pid;});nombre=(it.cubeta?'🪣 ':'')+esc((p&&p.nombre)||'?');pr=it.cubeta?(p&&p.cubeta||((p&&p.precio||0)*5)):((p&&p.precio)||0);}
      return'<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0">'
        +'<span>'+nombre+' ×'+it.qty+'</span>'
        +'<span style="color:var(--gold)">'+fmt(pr*it.qty)+'</span></div>';
    }).join('');

    var fpRows=FPAGO.map(function(f){
      var val=window._pagosParciales[f.id]||0;
      var fid=f.id;
      return'<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)" data-fpid="'+fid+'">'
        +'<span style="font-size:20px;width:28px">'+f.emoji+'</span>'
        +'<span style="color:'+f.color+';font-weight:700;font-size:13px;flex:1">'+f.label+'</span>'
        +'<div style="display:flex;align-items:center;gap:5px">'
        +'<button data-act="minus" data-fpid="'+fid+'" style="background:var(--dim);color:var(--muted);border:none;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:13px;font-weight:700">−</button>'
        +'<input type="number" id="fp-inp-'+fid+'" value="'+(val||'')+'" placeholder="0"'
        +' data-fpid="'+fid+'" data-act="input"'
        +' style="width:90px;background:var(--bg);border:1px solid '+(val>0?f.color:'var(--border)')+';border-radius:7px;padding:5px 8px;color:var(--text);font-size:13px;font-weight:700;text-align:right;outline:none"/>'
        +'<button data-act="plus" data-fpid="'+fid+'" style="background:var(--dim);color:var(--muted);border:none;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:13px;font-weight:700">+</button>'
        +'<button data-act="todo" data-fpid="'+fid+'" style="background:'+f.color+'22;color:'+f.color+';border:1px solid '+f.color+'44;border-radius:5px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:700">Todo</button>'
        +'</div></div>';
    }).join('');

    var pagosResumen=Object.entries(window._pagosParciales).filter(function(kv){return kv[1]>0;}).map(function(kv){
      var f=FPAGO.find(function(x){return x.id===kv[0];});
      return'<span style="background:'+(f?f.color:'#fff')+'22;color:'+(f?f.color:'#fff')+';border:1px solid '+(f?f.color:'#fff')+'33;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700">'+(f?f.emoji+' ':'')+fmt(kv[1])+'</span>';
    }).join(' ');

    return'<div style="text-align:center;margin-bottom:14px">'
      +'<div style="font-size:22px">🛸</div>'
      +'<div style="color:var(--muted);font-size:12px;margin-top:3px">'+(zona?zona.label:'')+' · '+esc(mesaActiva.nombre||'Mesa '+mesaActiva.num)+'</div>'
      +'<div style="font-size:26px;font-weight:900;margin-top:4px">'+fmt(total)+'</div>'
      +'<div style="color:var(--muted);font-size:12px">Total a cobrar</div></div>'

        +'<div style="height:100%;border-radius:99px;background:'+(completo?'#22c55e':'#f5a623')+';width:'+Math.min(100,Math.round(pagado/total*100))+'%;transition:width .3s"></div>'

      var btn=e.target.closest('[data-act]');if(!btn)return;

      if(act==='plus') ajustarPago(fid,1000);
      if(act==='todo') llenarConPendiente(fid);
    });
    m.addEventListener('input',function(e){
      if(e.target.getAttribute('data-act')==='input'){
        setPago(e.target.getAttribute('data-fpid'),e.target.value);
      }
    });

function setPago(fpId, rawVal){
  var val=parseInt(rawVal)||0;
  if(val<0)val=0;
  window._pagosParciales[fpId]=val;
  var el=document.getElementById('fp-inp-'+fpId);
  var f=FPAGO.find(function(x){return x.id===fpId;});
  if(el&&f)el.style.borderColor=val>0?f.color:'var(--border)';
  actualizarBarraCobro();
}

function ajustarPago(fpId, delta){
  var cur=window._pagosParciales[fpId]||0;
  var nuevo=Math.max(0,cur+delta);
  window._pagosParciales[fpId]=nuevo;
  var el=document.getElementById('fp-inp-'+fpId);
  if(el){el.value=nuevo||'';var f=FPAGO.find(function(x){return x.id===fpId;});if(f)el.style.borderColor=nuevo>0?f.color:'var(--border)';}
  actualizarBarraCobro();
}

function llenarConPendiente(fpId){
  var pagado=Object.entries(window._pagosParciales).filter(function(kv){return kv[0]!==fpId;}).reduce(function(a,kv){return a+(kv[1]||0);},0);
  var pendiente=Math.max(0,window._totalCobro-pagado);
  window._pagosParciales[fpId]=pendiente;
  var el=document.getElementById('fp-inp-'+fpId);
  if(el){el.value=pendiente||'';var f=FPAGO.find(function(x){return x.id===fpId;});if(f)el.style.borderColor=pendiente>0?f.color:'var(--border)';}
  actualizarBarraCobro();
}

function actualizarBarraCobro(){
  var pagado=Object.values(window._pagosParciales).reduce(function(a,v){return a+(v||0);},0);
  var total=window._totalCobro;
  var pendiente=total-pagado;
  var completo=Math.round(pendiente)<=0;
  var pct=Math.min(100,Math.round(pagado/total*100));

  // Update progress bar
  var bar=document.querySelector('#modal1 .btn-full[onclick="confirmarCobro()"]');
  if(bar)bar.disabled=!completo;

  var barra=document.querySelector('#modal1 div[style*="height:6px"]>div');
  if(barra){barra.style.width=pct+'%';barra.style.background=completo?'#22c55e':'#f5a623';}

  // Update pagado/pendiente text
  var spans=document.querySelectorAll('#modal1 span[style*="font-weight:700"]');
  if(spans.length>=2){
    spans[0].textContent='Pagado: '+fmt(pagado);
    spans[1].style.color=completo?'#22c55e':'#f5a623';
    spans[1].textContent=completo?'✓ Completo':'Pendiente: '+fmt(pendiente);
  }
}

function confirmarCobro(){
  if(!mesaActiva)return;
  var pagos=window._pagosParciales||{};
  var pagado=Object.values(pagos).reduce(function(a,v){return a+(v||0);},0);
  var total=totalPedido(mesaActiva.id);
  if(Math.round(pagado)<Math.round(total)){alert('El total pagado no cubre el valor. Verifica los montos.');return;}

  var mesa=mesaActiva;
  var ped=pedidos[mesa.id]||[];

  // Build venta with multiple payments
  var pagosList=Object.entries(pagos).filter(function(kv){return kv[1]>0;}).map(function(kv){
    var f=FPAGO.find(function(x){return x.id===kv[0];});
    return{fp:kv[0],label:(f?f.label:''),monto:kv[1]};
  });
  var fpPrincipal=pagosList.length===1?pagosList[0].fp:'mixto';
  var fpLabel=pagosList.length===1?pagosList[0].label:pagosList.map(function(p){return p.label+' '+fmt(p.monto);}).join(' + ');

  var venta={
    mesa:mesa.nombre||('Mesa '+mesa.num),zona:mesa.zona,
    ts:Date.now(),total:total,
    items:JSON.parse(JSON.stringify(ped)),
    fp:fpPrincipal,fpLabel:fpLabel,
    pagos:pagosList,
    uid:usuarioActivo.id,uidNombre:usuarioActivo.nombre
  };
  fbPush('ventas',venta);
  ped.forEach(function(it){
    if(it.isCustom) return;  // no inventory to discount
    if(it.isCombo&&it.comboIngredientes){
      it.comboIngredientes.forEach(function(ing){
        var p=menu.find(function(m){return m.id===ing.prodId;});
        if(p)p.stock=Math.max(0,p.stock-(ing.cantidad*it.qty));
      });
    } else {
      var p=menu.find(function(m){return m.id===it.pid;});
      if(p){var c=it.cubeta?it.qty*5:it.qty;p.stock=Math.max(0,p.stock-c);}
    }
  });
  var mo={};menu.forEach(function(m){mo[m.id]=m;});fbSet('menu',mo);
  imprimirTicket(mesa,ped,total,pagosList);

  var r=ref('pedidos/'+mesa.id);if(r)r.set(null);
  mesaActiva=null;closeModal1();render();
}

function agregarComboAPedido(cbId){
  if(!mesaActiva)return;
  var cb=combos.find(function(c){return c.id===cbId;});
  if(!cb)return;

  // Check if any ingredient is "categoria" type - need to ask customer choice
  var catIngs=cb.ingredientes.filter(function(i){return i.tipo==='categoria';});
  if(catIngs.length>0){
    abrirSelectorCombo(cb, catIngs, 0, []);
    return;
  }

  // All specific products - check stock and add directly
  var ok=cb.ingredientes.every(function(ing){
    var p=menu.find(function(m){return m.id===ing.prodId;});
    return p&&p.stock>=ing.cantidad;
  });
  if(!ok){alert('Stock insuficiente para este combo.');return;}
  confirmarComboEnPedido(cb, []);
}

// Opens a modal to select specific products for each "categoria" ingredient
function abrirSelectorCombo(cb, catIngs, step, selecciones){
  if(step>=catIngs.length){
    // All selections done
    confirmarComboEnPedido(cb, selecciones);
    closeModal2();
    return;
  }
  var ing=catIngs[step];
  var disponibles=menu.filter(function(p){return p.cat===ing.cat&&p.stock>=ing.cantidad;});
  if(disponibles.length===0){
    closeModal2();
    alert('No hay stock de '+ing.cat+' para este combo.');
    return;
  }

  var prodBtns=disponibles.map(function(p){

function confirmarComboEnPedido(cb, selecciones){
  // Build final ingredient list (replacing categoria with chosen products)
  var finalIngs=[];
  var selIdx=0;
  cb.ingredientes.forEach(function(ing){
    if(ing.tipo==='categoria'){
      var sel=selecciones[selIdx++];
      if(sel){
        var p=menu.find(function(m){return m.id===sel.prodId;});
        finalIngs.push({tipo:'producto',prodId:sel.prodId,cantidad:ing.cantidad,
          nombre:p?p.nombre:'?',emoji:p?p.emoji:'?',und:p?p.und:'und'});
      }
    } else {
      finalIngs.push(ing);
    }
  });

  // Check stock for all final ingredients
  var ok=finalIngs.every(function(ing){
    var p=menu.find(function(m){return m.id===ing.prodId;});
    return p&&p.stock>=ing.cantidad;
  });
  if(!ok){alert('Stock insuficiente para alguno de los productos elegidos.');return;}

  var id=mesaActiva.id;
  if(!pedidos[id])pedidos[id]=[];
  // Each combo addition is unique (different product choices) — always push new
  pedidos[id].push({
    pid:'combo_'+cb.id+'_'+Date.now(),
    cubeta:false,qty:1,isCombo:true,
    comboId:cb.id,comboNombre:cb.nombre,comboEmoji:cb.emoji,
    comboPrecio:cb.precio,comboIngredientes:finalIngs
  });
  var r=ref('pedidos/'+id);if(r)r.set(pedidos[id]);
  renderSoloPedido();updateHeader();actualizarColorMesas();
}

// Temp storage while editing a combo
var _comboTemp={ingredientes:[]};

function nuevoCombo(){
  editandoCombo='nuevo';
  _comboTemp={ingredientes:[]};
  render();setTimeout(bindComboEmojiPicker,50);
}
function cancelarCombo(){editandoCombo=null;render();}
function editarCombo(id){
  editandoCombo=id;
  var c=combos.find(function(x){return x.id===id;});
  _comboTemp={ingredientes:c?JSON.parse(JSON.stringify(c.ingredientes)):[]};
  render();setTimeout(bindComboEmojiPicker,50);
}
function borrarCombo(id){
  if(!confirm('¿Eliminar este combo?'))return;
  combos=combos.filter(function(c){return c.id!==id;});
  var co={};combos.forEach(function(c){co[c.id]=c;});fbSet('combos',co);render();
}

function bindComboEmojiPicker(){
  var picker=document.getElementById('combo-emoji-picker');
  if(!picker||picker._bound)return;
  picker._bound=true;
  picker.addEventListener('click',function(e){
    var btn=e.target.closest('[data-cei]');if(!btn)return;
    var COMBO_EMOJIS=['🎁','🎉','🍻','🥃','🍺','🍷','🍹','🎊','⭐','🔥','💫','🎯'];
    var e2=COMBO_EMOJIS[parseInt(btn.getAttribute('data-cei'))];

function limpiarCatSel(){var s=document.getElementById('cb-cat-sel');if(s)s.value='';}
function limpiarProdSel(){var s=document.getElementById('cb-prod-sel');if(s)s.value='';}

function agregarIngCombo(){
  var prodSel=document.getElementById('cb-prod-sel');
  var catSel=document.getElementById('cb-cat-sel');
  var cantEl=document.getElementById('cb-prod-cant');
  if(!cantEl)return;
  var cant=parseInt(cantEl.value)||1;
  if(cant<1){alert('La cantidad debe ser al menos 1.');return;}

  var prodVal=prodSel?prodSel.value:'';
  var catVal=catSel?catSel.value:'';

  if(!prodVal&&!catVal){alert('Selecciona un producto específico o una categoría.');return;}

  if(prodVal){
    // Specific product: value = "prod:ID"
    var prodId=parseInt(prodVal.replace('prod:',''));
    if(!prodId){alert('Selecciona un producto válido.');return;}
    var existe=_comboTemp.ingredientes.findIndex(function(i){return i.tipo==='producto'&&i.prodId===prodId;});
    if(existe>=0){_comboTemp.ingredientes[existe].cantidad+=cant;}
    else{
      var p=menu.find(function(m){return m.id===prodId;});
      _comboTemp.ingredientes.push({tipo:'producto',prodId:prodId,cantidad:cant,
        nombre:p?p.nombre:'?',emoji:p?p.emoji:'?',und:p?p.und:'und'});
    }
  } else {
    // Category: value = "cat:Cervezas"
    var cat=catVal.replace('cat:','');
    var existe2=_comboTemp.ingredientes.findIndex(function(i){return i.tipo==='categoria'&&i.cat===cat;});
    if(existe2>=0){_comboTemp.ingredientes[existe2].cantidad+=cant;}
    else{_comboTemp.ingredientes.push({tipo:'categoria',cat:cat,cantidad:cant});}
  }

  if(prodSel)prodSel.value='';
  if(catSel)catSel.value='';
  cantEl.value=1;
  render();setTimeout(bindComboEmojiPicker,50);
}

function quitarIngCombo(idx){
  _comboTemp.ingredientes.splice(idx,1);
  render();setTimeout(bindComboEmojiPicker,50);
}

function cambiarCantIngCombo(idx,val){
  var cant=parseInt(val)||1;
  if(cant<1)cant=1;
  _comboTemp.ingredientes[idx].cantidad=cant;
}

function actualizarInfoCombo(){
  var precio=parseInt((document.getElementById('cb-precio')||{}).value)||0;
  var costoEl=document.getElementById('cb-costo');
  var ahorroEl=document.getElementById('cb-ahorro');
  if(costoEl){
    var costoAprox=_comboTemp.ingredientes.reduce(function(a,ing){
      var p=menu.find(function(m){return m.id===ing.prodId;});
      return a+(p?p.precio*ing.cantidad:0);
    },0);
    costoEl.textContent=fmt(costoAprox);
    if(ahorroEl)ahorroEl.textContent=fmt(Math.max(0,costoAprox-precio));
  }
}

function guardarCombo(){
  var nombre=((document.getElementById('cb-nombre')||{}).value||'').trim();
  var precio=parseInt((document.getElementById('cb-precio')||{}).value)||0;
  var emoji=(document.getElementById('cb-emoji')||{}).value||'🎁';
  if(!nombre){alert('Escribe el nombre del combo.');return;}
  if(!precio||precio<=0){alert('Escribe el precio de venta.');return;}
  if(!_comboTemp.ingredientes.length){alert('Agrega al menos un ingrediente al combo.');return;}
  var obj={
    id:editandoCombo==='nuevo'?'cb'+Date.now():editandoCombo,
    nombre:nombre,precio:precio,emoji:emoji,
    ingredientes:JSON.parse(JSON.stringify(_comboTemp.ingredientes))
  };
  if(editandoCombo==='nuevo'){combos.push(obj);}

}

function renderVentas(){
  var puedeExcel=usuarioActivo&&(usuarioActivo.rol==='admin'||usuarioActivo.rol==='cajero');
  var hoyV=ventas.filter(function(v){return fmtDate(v.ts)===todayStr();});
  var totV=hoyV.reduce(function(a,v){return a+v.total;},0);
  var cubetazos=hoyV.reduce(function(a,v){return a+v.items.filter(function(i){return i.cubeta;}).reduce(function(b,i){return b+i.qty;},0);},0);
  var porPago={};hoyV.forEach(function(v){porPago[v.fp]=(porPago[v.fp]||0)+v.total;});
  var porProd={};
  hoyV.forEach(function(v){v.items.forEach(function(it){
    var p=menu.find(function(m){return m.id===it.pid;});if(!p)return;
    var k=it.cubeta?p.nombre+'_c':p.nombre;
    if(!porProd[k])porProd[k]={nombre:p.nombre,emoji:p.emoji,cubeta:it.cubeta,qty:0,total:0};
    var pr=it.cubeta?(p.cubeta||p.precio*5):p.precio;
    porProd[k].qty+=it.qty;porProd[k].total+=pr*it.qty;
  });});
  var ranking=Object.values(porProd).sort(function(a,b){return b.total-a.total;});

  var kpis='<div class="kpi-grid">'
    +[['💰','Ventas hoy',fmt(totV),'#f5a623'],['🍽️','Mesas cobradas',hoyV.length,'#22c55e'],['🪣','Cubetazos',cubetazos,'#22c55e'],['📦','SKUs vendidos',ranking.length,'#38bdf8']].map(function(x){
      return'<div class="kpi"><div style="font-size:20px">'+x[0]+'</div><div style="color:var(--muted);font-size:10px;margin-top:2px">'+x[1]+'</div><div style="color:'+x[3]+';font-weight:900;font-size:16px;margin-top:2px">'+x[2]+'</div></div>';
    }).join('')+'</div>';

  var pagoRows=FPAGO.filter(function(f){return porPago[f.id];}).map(function(f){
    return'<div class="res-row"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:17px">'+f.emoji+'</span><span style="color:'+f.color+';font-weight:700;font-size:13px">'+f.label+'</span></div><span style="color:var(--gold);font-weight:800">'+fmt(porPago[f.id])+'</span></div>';
  }).join('')||'<div style="color:var(--dim);text-align:center;padding:14px;font-size:13px">Sin cobros</div>';

  var prodRows=ranking.slice(0,8).map(function(p){
    return'<div class="res-row"><div><div style="font-size:12px;font-weight:600">'+p.emoji+' '+esc(p.nombre)+(p.cubeta?' 🪣':'')+'</div><div style="color:var(--muted);font-size:11px">'+p.qty+' '+(p.cubeta?'cubetas':'und')+'</div></div><span style="color:var(--gold);font-weight:800">'+fmt(p.total)+'</span></div>';
  }).join('')||'<div style="color:var(--dim);text-align:center;padding:14px;font-size:13px">Sin ventas</div>';

  var histRows=hoyV.slice().reverse().map(function(v){
    var f=FPAGO.find(function(x){return x.id===v.fp;});var fpDisplay=v.fpLabel||(f?f.emoji+' '+f.label:'');
    var z=ZONAS.find(function(x){return x.id===v.zona;});
    return'<div class="hist-grid" style="display:block;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 12px;margin-bottom:6px">'
      +'<div class="flex-between"><div><div style="font-size:12px;font-weight:700">'+(z?z.label:'')+' · '+esc(v.mesa||'')+'</div>'
      +'<div style="color:var(--muted);font-size:11px">'+fmtTime(v.ts)+' · '+fpDisplay+'</div>'
      +'<div style="color:var(--muted);font-size:10px">'+esc(v.uidNombre||v.uid||'')+'</div></div>'
      +'<span style="color:var(--gold);font-weight:900;font-size:14px">'+fmt(v.total)+'</span></div></div>';
  }).join('')||'<div style="color:var(--dim);text-align:center;padding:14px;font-size:13px">Sin cobros hoy</div>';

  return(puedeExcel?'<div style="display:flex;justify-content:flex-end;margin-bottom:12px">'
    +'<button class="btn btn-green" onclick="exportarExcel()" style="background:linear-gradient(135deg,#1d6f42,#21a55c)">📊 Descargar Excel</button>'
    +'</div>':'<div class="alert-box alert-blue mb12">📊 Solo administradores y cajeros pueden descargar el reporte Excel.</div>')
    +kpis
    +'<div class="res-grid">'
    +'<div class="res-card"><div class="section-title">Por forma de pago — hoy</div>'+pagoRows+'</div>'
    +'<div class="res-card"><div class="section-title">Top productos — hoy</div>'+prodRows+'</div>'
    +'<div class="res-card full-col"><div class="section-title">Cobros del día</div>'+histRows+'</div>'
    +'</div>';
}

    +'.pie{text-align:center;font-size:'+(fs-3)+'px;margin-top:12px;color:#777}'

function exportarExcel(){
  if(!window.XLSX){alert('La librería Excel no está disponible. Verifica tu conexión a internet e intenta de nuevo.');return;}
  var X=window.XLSX,wb=X.utils.book_new();
  // Detalle ventas
  var det=[];
  ventas.forEach(function(v){
    var fp=FPAGO.find(function(f){return f.id===v.fp;});
    var z=ZONAS.find(function(x){return x.id===v.zona;});
    var ts=new Date(v.ts);
    v.items.forEach(function(it){
      var p=menu.find(function(m){return m.id===it.pid;});
      var pr=it.cubeta?(p&&p.cubeta||((p&&p.precio||0)*5)):((p&&p.precio)||0);
      det.push({Fecha:ts.toLocaleDateString('es-CO'),Hora:ts.toLocaleTimeString('es-CO'),Zona:z?z.label:'',Mesa:v.mesa||'',Usuario:v.uidNombre||v.uid||'',Producto:(p&&p.nombre)||'',Tipo:it.cubeta?'Cubetazo x5':'Detal',Cantidad:it.qty,'Precio unit':pr,Subtotal:pr*it.qty,'Forma pago':fp?fp.label:v.fp,'Total mesa':v.total});
    });
  });
  var ws1=X.utils.json_to_sheet(det);ws1['!cols']=[10,8,13,14,14,22,11,9,12,12,15,12].map(function(w){return{wch:w};});X.utils.book_append_sheet(wb,ws1,'Ventas detalle');
  // Gastos
  var gastDet=gastos.map(function(g){return{Fecha:fmtDate(g.ts),Hora:fmtTime(g.ts),Concepto:g.concepto,Categoria:g.categoria,Valor:g.valor,Usuario:g.uidNombre||g.uid||'',Notas:g.notas||''};});
  var ws2=X.utils.json_to_sheet(gastDet);X.utils.book_append_sheet(wb,ws2,'Gastos');
  // Por día
  var pd={};ventas.forEach(function(v){var d=fmtDate(v.ts);if(!pd[d])pd[d]={Fecha:d,Ventas:0,Cobros:0};pd[d].Ventas+=v.total;pd[d].Cobros++;});
  X.utils.book_append_sheet(wb,X.utils.json_to_sheet(Object.values(pd)),'Por día');
  // Por forma pago
  var pp={};ventas.forEach(function(v){var l=(FPAGO.find(function(f){return f.id===v.fp;})||{label:v.fp}).label;if(!pp[l])pp[l]={'Forma de pago':l,Cobros:0,'Total COP':0};pp[l].Cobros++;pp[l]['Total COP']+=v.total;});
  X.utils.book_append_sheet(wb,X.utils.json_to_sheet(Object.values(pp)),'Por forma de pago');
  // Por usuario
  var pu={};ventas.forEach(function(v){var u=v.uidNombre||v.uid||'?';if(!pu[u])pu[u]={Usuario:u,Cobros:0,'Total COP':0};pu[u].Cobros++;pu[u]['Total COP']+=v.total;});
  X.utils.book_append_sheet(wb,X.utils.json_to_sheet(Object.values(pu)),'Por usuario');
  // Cierres
  var cDet=cierres.map(function(c){return{Fecha:fmtDate(c.ts),Hora:fmtTime(c.ts),'Caja inicial':c.cajaInicial,'Total ventas':c.ventas,'Total gastos':c.gastos,'Utilidad bruta':c.utilidad,'Num ventas':c.numVentas,'Num gastos':c.numGastos,Usuario:c.uid||''};});
  X.utils.book_append_sheet(wb,X.utils.json_to_sheet(cDet),'Cierres');
  X.writeFile(wb,'Area52_'+new Date().toLocaleDateString('es-CO').replace(/\//g,'-')+'.xlsx');
}

function exportarCierre(id){
  if(!window.XLSX){alert('Espera un momento.');return;}
  var c=cierres.find(function(x){return x.id===id;});if(!c)return;
  var X=window.XLSX,wb=X.utils.book_new();
  var resumen=[
    {Concepto:'Fecha',Valor:fmtDate(c.ts)},
    {Concepto:'Caja inicial',Valor:c.cajaInicial},
    {Concepto:'Total ventas',Valor:c.ventas},
    {Concepto:'Total gastos',Valor:c.gastos},
    {Concepto:'Utilidad bruta',Valor:c.utilidad},
  ];
  FPAGO.forEach(function(f){resumen.push({Concepto:f.label,Valor:(c.porFP&&c.porFP[f.id])||0});});
  var ws=X.utils.json_to_sheet(resumen);X.utils.book_append_sheet(wb,ws,'Cierre');
  X.writeFile(wb,'Area52_Cierre_'+fmtDate(c.ts).replace(/\//g,'-')+'.xlsx');
}

/* ═══════════════ HELPERS MODAL ═══════════════ */
function modal1(content){var m=document.getElementById('modal1');m.innerHTML='<div class="modal-box">'+content+'</div>';m.style.display='flex';}
function modal2(content){var m=document.getElementById('modal2');m.innerHTML='<div class="modal-box">'+content+'</div>';m.style.display='flex';}
function closeModal1(){document.getElementById('modal1').style.display='none';}
function closeModal2(){document.getElementById('modal2').style.display='none';}
document.addEventListener('click',function(e){
  var m1=document.getElementById('modal1'),m2=document.getElementById('modal2');
  if(e.target===m1)closeModal1();
  if(e.target===m2)closeModal2();
  // Quick value buttons in item personalizado
  var qvBtn=e.target.closest('[data-qv]');
  if(qvBtn){
    var el=document.getElementById('ci-valor');
    if(el)el.value=qvBtn.getAttribute('data-qv');
  }
});

/* ═══════════════ INIT ═══════════════ */

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',renderLogin);}else{renderLogin();}
</script>
