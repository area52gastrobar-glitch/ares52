<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070e;--panel:#0d0d18;--card:#13131f;--card2:#181828;
  --border:#22223a;--accent:#a855f7;--gold:#f5a623;
  --green:#22c55e;--red:#ef4444;--blue:#38bdf8;--cyan:#06b6d4;
  --text:#e8e8f5;--muted:#55558a;--dim:#2a2a45;
}
body{background:var(--bg);color:var(--text);font-family:'Trebuchet MS',sans-serif;min-height:100vh}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:99px}

/* ── LOGIN ── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--card2);border:1px solid #a855f733;border-radius:24px;padding:32px;width:370px;max-width:95vw;box-shadow:0 0 80px #a855f722}
.user-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.user-card:hover,.user-card.sel{border-color:var(--accent);background:#a855f712;box-shadow:0 0 12px #a855f733}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--dim);transition:background .15s}
.pin-dot.filled{background:var(--accent)}
.pin-btn{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:20px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;width:100%}
.pin-btn:hover{background:var(--card2);border-color:var(--accent)}
.pin-btn:active{transform:scale(.93)}

/* ── LAYOUT ── */
#header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 18px;display:none;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
#tabs{background:var(--panel);border-bottom:1px solid var(--border);display:none;overflow-x:auto}
.tab-btn{background:transparent;border:none;border-bottom:2px solid transparent;padding:11px 18px;font-size:13px;font-weight:700;color:var(--muted);white-space:nowrap;cursor:pointer;transition:all .15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
#content{padding:10px 12px;max-width:1340px;margin:0 auto}

/* ── LOGO ── */
.logo-title{font-weight:900;font-size:20px;background:linear-gradient(90deg,#a855f7,#f5a623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:4px;text-transform:uppercase;line-height:1}
.logo-sub{color:var(--muted);font-size:9px;letter-spacing:3px;text-transform:uppercase;font-weight:600}

/* ── TAGS / PILLS ── */
.tag{border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700}
.pill{border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.pill.active{border-color:var(--accent);background:#a855f722;color:var(--accent)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 0 12px #a855f744}
.btn-green{background:var(--green);color:#000;box-shadow:0 0 10px #22c55e44}
.btn-blue{background:var(--blue);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-gold{background:var(--gold);color:#000;box-shadow:0 0 10px #f5a62344}
.btn-dark{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.btn-outline{background:transparent;border:1.5px solid var(--muted);color:var(--muted)}
.btn:disabled{background:var(--dim);color:var(--muted);cursor:not-allowed;opacity:.5;box-shadow:none}

/* ── INPUTS ── */
.inp{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:5px 9px;font-size:12px}
select.inp{cursor:pointer}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(6px)}
.modal-box{background:var(--card2);border:1px solid #a855f744;border-radius:20px;padding:26px;width:420px;max-width:95vw;box-shadow:0 0 60px #a855f722;max-height:90vh;overflow-y:auto}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.card2{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:14px}
.section-title{color:var(--muted);font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}

/* ── MAPA ── */
#mapa-wrap{position:relative;background:var(--bg);border-radius:14px;height:300px;user-select:none;overflow:scroll;overflow-x:scroll;overflow-y:scroll;border:1px solid var(--border);-webkit-overflow-scrolling:touch}@media(min-width:700px){#mapa-wrap{height:430px}}
.mesa-node{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid;transition:box-shadow .2s;cursor:pointer}

/* ── PEDIDO ── */
.carta-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.carta-item{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 9px;cursor:pointer;transition:border-color .15s}
.carta-item:hover{border-color:var(--accent)}

/* ── INVENTARIO ── */
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.inv-bar{height:4px;background:var(--dim);border-radius:99px;margin-bottom:8px}
.inv-fill{height:100%;border-radius:99px;transition:width .3s}

/* ── VENTAS / CAJA ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.res-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.full-col{grid-column:1/-1}

/* ── GASTOS ── */
.gasto-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border);gap:8px}

/* ── CIERRE ── */
.cierre-card{background:var(--card);border:2px solid var(--gold);border-radius:14px;padding:18px;margin-bottom:14px}
.cierre-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.cierre-total{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:18px;font-weight:900}

/* ── HISTORIAL CIERRES ── */
.cierre-hist-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.cierre-hist-item:hover{border-color:var(--gold)}

/* ── ADMIN ── */
.user-row-admin{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.forma-btn{flex:1;background:transparent;border:2px solid var(--border);border-radius:10px;padding:9px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.forma-btn.sel{border-color:var(--accent);background:#a855f720}
.ori-btn{flex:1;background:transparent;border:2px solid var(--border);border-radius:9px;padding:7px 4px;cursor:pointer;font-size:12px;font-weight:700;color:var(--muted)}
.ori-btn.sel{border-color:var(--blue);background:#38bdf820;color:var(--blue)}

/* ── EMOJI PICKER ── */
.emoji-grid{display:flex;flex-wrap:wrap;gap:5px}
.emj-btn{font-size:22px;background:transparent;border:2px solid transparent;border-radius:8px;cursor:pointer;padding:4px;transition:all .15s;line-height:1}
.emj-btn:hover{background:#a855f720}
.emj-btn.sel{background:#a855f722;border-color:var(--accent)}

/* ── SYNC ── */
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MISC ── */
.alert-box{border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px}
.alert-red{background:#ef444418;border:1px solid #ef444444;color:#ef4444}
.alert-green{background:#22c55e14;border:1px solid #22c55e33;color:#22c55e}
.alert-blue{background:#38bdf814;border:1px solid #38bdf833;color:#38bdf8}
.alert-gold{background:#f5a62314;border:1px solid #f5a62333;color:#f5a623}
.zona-btn{border-radius:10px;padding:7px 15px;font-weight:800;font-size:13px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s}
.flex{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.grid2{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:700px){.grid2{grid-template-columns:1fr 375px}}
.grid1{display:grid;grid-template-columns:1fr}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb14{margin-bottom:14px}.mb4{margin-bottom:4px}
.cat-title{color:var(--muted);font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:5px;margin-top:14px}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.prod-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;gap:10px;transition:border-color .15s}
.prod-card:hover{border-color:var(--accent)}
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
</style>
</head>

/* ═══════════════ FIREBASE ═══════════════ */
// db is set by the dynamic loader in <head> once Firebase scripts load
function getDb(){return window._db||null;}
function ref(path){var d=getDb();return d?d.ref(path):null;}
function fbSet(path,val){var r=ref(path);if(r)r.set(val);}
function fbPush(path,val){var r=ref(path);if(r)r.push(val);}
function fbOn(path,cb){var r=ref(path);if(r)r.on('value',function(s){cb(s.val());});return r;}
function fbOff(path){var r=ref(path);if(r)r.off();}

/* ═══════════════ CONSTANTES ═══════════════ */

function zonaKey(z){ return z==='antejardín'?'antejardIn':z; }
var fmt=function(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',maximumFractionDigits:0}).format(n||0);};
var fmtDate=function(ts){return new Date(ts).toLocaleDateString('es-CO');};
var fmtTime=function(ts){return new Date(ts).toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});};
var fmtDT=function(ts){return fmtDate(ts)+' '+fmtTime(ts);};
function todayStr(){return new Date().toLocaleDateString('es-CO');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function precioItem(it){
  if(it.isCombo) return it.comboPrecio||0;
  if(it.isCustom) return it.customPrecio||0;
  var p=menu.find(function(m){return m.id===it.pid;});if(!p)return 0;return it.cubeta?(p.cubeta||p.precio*5):p.precio;
}
function totalPedido(mid){return(pedidos[mid]||[]).reduce(function(a,it){return a+precioItem(it)*it.qty;},0);}
function ventasTurno(){return ventas.filter(function(v){return v.ts>=turnoInicio;});}
function gastosTurno(){return gastos.filter(function(g){return g.ts>=turnoInicio;});}
function totalVentasHoy(){return ventasTurno().reduce(function(a,v){return a+v.total;},0);}
function totalGastosHoy(){return gastosTurno().reduce(function(a,g){return a+g.valor;},0);}

function iniciarSync(){
  if(!getDb()){
    console.warn('Sin Firebase - modo local');
    // Update sync indicator to show offline
    var dot=document.getElementById('sync-dot');
    if(dot){dot.style.background='#f5a623';dot.title='Modo local - sin sincronización';}
    return;
  }
  var dot=document.getElementById('sync-dot');
  if(dot){dot.style.background='#22c55e';dot.title='Conectado a Firebase';}
  fbOn('pedidos',function(v){
    pedidos=v||{};
    Object.keys(pedidos).forEach(function(k){if(!Array.isArray(pedidos[k]))pedidos[k]=Object.values(pedidos[k]||{});});
    renderSoloPedido();updateHeader();actualizarColorMesas();
  });
  fbOn('ventas',function(v){ventas=v?Object.values(v):[];updateHeader();if(tabActual==='ventas'||tabActual==='caja')render();});
  fbOn('gastos',function(v){gastos=v?Object.values(v):[];if(tabActual==='gastos'||tabActual==='caja')render();});
  fbOn('menu',function(v){if(v){menu=Object.values(v);menu.forEach(function(m){if(m.stock==null||isNaN(parseInt(m.stock)))m.stock=0;else m.stock=parseInt(m.stock);});}if(tabActual==='carta'||tabActual==='inventario')render();});
  fbOn('mesas',function(v){if(v)mesas=Object.values(v);if(tabActual==='mesas')render();});
  fbOn('paredes',function(v){
    if(v){
      paredesData={antejardIn:[],piso1:[],piso2:[]};
      if(v.antejardIn) paredesData.antejardIn=Array.isArray(v.antejardIn)?v.antejardIn:Object.values(v.antejardIn);
      if(v['antejardín']) paredesData.antejardIn=Array.isArray(v['antejardín'])?v['antejardín']:Object.values(v['antejardín']);
      if(v.piso1) paredesData.piso1=Array.isArray(v.piso1)?v.piso1:Object.values(v.piso1);
      if(v.piso2) paredesData.piso2=Array.isArray(v.piso2)?v.piso2:Object.values(v.piso2);
    } else {
      paredesData={antejardIn:[],piso1:[],piso2:[]};
    }
    if(tabActual==='mesas')render();
  });
  fbOn('combos',function(v){combos=v?Object.values(v):[];if(tabActual==='combos'||tabActual==='mesas')render();});
  fbOn('cocinaEntregados',function(v){
    cocinaEntregados=v||{};
    if(tabActual==='cocina')render();
  });
  fbOn('cierres',function(v){cierres=v?Object.values(v):[];if(tabActual==='caja')render();});
  fbOn('cajaHoy',function(v){if(v)cajaHoy=v;if(tabActual==='caja')render();});
  fbOn('turnoInicio',function(v){if(v)turnoInicio=v;if(tabActual==='caja'||tabActual==='ventas')render();});
  fbOn('consumoSocios',function(v){
    consumoSocios=v?(Array.isArray(v)?v:Object.values(v)):[];
    if(tabActual==='socios')render();
  });
  fbOn('empleados',function(v){
    empleados=v?(Array.isArray(v)?v:Object.values(v)):[];
    if(tabActual==='empleados')render();
  });
  fbOn('movEmpleados',function(v){
    movEmpleados=v?(Array.isArray(v)?v:Object.values(v)):[];
    if(tabActual==='empleados')render();
  });
  fbOn('usuarios',function(v){
    if(v){usuarios=Array.isArray(v)?v:Object.values(v);}
    if(tabActual==='admin')render();
  });
}

function renderLogin(){

function selUsuario(id){
  usuarioSelLogin=usuarios.find(function(u){return u.id===id;});
  if(!usuarioSelLogin)return;
  document.getElementById('login-step-user').style.display='none';
  document.getElementById('login-step-pin').style.display='block';
  document.getElementById('pin-username').textContent=usuarioSelLogin.emoji+' '+usuarioSelLogin.nombre;
  pinBuffer='';renderPinDots();renderPinKeypad();
}
function backToUsers(){
  usuarioSelLogin=null;pinBuffer='';
  document.getElementById('login-step-user').style.display='block';
  document.getElementById('login-step-pin').style.display='none';
  document.getElementById('pin-err').textContent='';
}
function renderPinDots(){
  var c=document.getElementById('pin-dots');
  if(!c)return;
  c.innerHTML=Array.from({length:4},function(_,i){
    return '<div class="pin-dot'+(i<pinBuffer.length?' filled':'')+'"></div>';
  }).join('');
}
function renderPinKeypad(){
  var kp=document.getElementById('pin-keypad');
  if(!kp)return;
  var keys=['1','2','3','4','5','6','7','8','9','','0','DEL'];
  kp.innerHTML=keys.map(function(k){
    if(k==='')return '<div></div>';
    return '<button class="pin-btn" onclick="pinKey(\''+k+'\')">'+(k==='DEL'?'&#9003;':k)+'</button>';
  }).join('');
}
function pinKey(k){
  if(k==='DEL'){pinBuffer=pinBuffer.slice(0,-1);renderPinDots();return;}
  if(pinBuffer.length>=4)return;
  pinBuffer+=k;renderPinDots();
  if(pinBuffer.length===4)setTimeout(verificarPin,120);
}
function verificarPin(){
  if(!usuarioSelLogin){backToUsers();return;}
  if(pinBuffer===usuarioSelLogin.pin){
    usuarioActivo=usuarioSelLogin;
  window._usuarioActivoGlobal=usuarioActivo;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('header').style.display='flex';
    document.getElementById('tabs').style.display='flex';
    document.getElementById('h-emoji').textContent=usuarioActivo.emoji;
    document.getElementById('h-nombre').textContent=usuarioActivo.nombre;
    document.getElementById('h-rol').textContent=(ROLES[usuarioActivo.rol]||{}).label||usuarioActivo.rol;
    iniciarSync();
    tabActual=(ROLES[usuarioActivo.rol].tabs||['mesas'])[0];
    renderTabs();render();
  } else {
    document.getElementById('pin-err').textContent='PIN incorrecto';
    pinBuffer='';renderPinDots();
    setTimeout(function(){document.getElementById('pin-err').textContent='';},2000);
  }
}
function cerrarSesion(){
  if(getDb())['pedidos','ventas','gastos','menu','mesas','paredes','cierres','cajaHoy','combos'].forEach(fbOff);
  usuarioActivo=null;mesaActiva=null;tabActual='mesas';
  document.getElementById('header').style.display='none';
  document.getElementById('tabs').style.display='none';
  document.getElementById('content').innerHTML='';
  document.getElementById('login-screen').style.display='flex';
  pinBuffer='';usuarioSelLogin=null;
  document.getElementById('login-step-user').style.display='block';
  document.getElementById('login-step-pin').style.display='none';

}

function updateHeader(){
  if(!usuarioActivo)return;
  var lib=mesas.filter(function(m){return!(pedidos[m.id]&&pedidos[m.id].length>0);}).length;
  var ocp=mesas.length-lib;
  // Cobrado en el turno
  var cobrado=totalVentasHoy();
  // Por cobrar: suma de pedidos activos en todas las mesas
  var porCobrar=mesas.reduce(function(a,m){return a+totalPedido(m.id);},0);

  document.getElementById('h-libres').textContent=lib+' libres';

  var ep=document.getElementById('h-porcobrar');
  var et=document.getElementById('h-total');
  if(ec)ec.textContent='✅ '+fmt(cobrado);

/* ═══════════════ MAPA EVENTS ═══════════════ */
function bindMapaEvents(){
  var el=document.getElementById('mapa-wrap');
  if(!el)return;
  var newEl=el.cloneNode(true);
  el.parentNode.replaceChild(newEl,el);
  el=newEl;

  function getCoords(e){
    var r=el.getBoundingClientRect();
    var src=e.touches?e.touches[0]:e;
    return{x:src.clientX-r.left, y:src.clientY-r.top};
  }
  function savePared(x2,y2){
    var k2=zonaKey(zonaActual);
    if(!paredesData[k2])paredesData[k2]=[];
    var dx=x2-_paredDibujando.x1, dy=y2-_paredDibujando.y1;
    if(Math.sqrt(dx*dx+dy*dy)>8){
      paredesData[k2].push({x1:_paredDibujando.x1,y1:_paredDibujando.y1,x2:x2,y2:y2,color:_colorPared,grosor:_grosorPared});
      var rp=ref('paredes/'+k2);
      if(rp)rp.set(paredesData[k2]); else fbSet('paredes',paredesData);
    }
    _paredDibujando=null;
    render();
  }
  function updatePreview(x2,y2){
    if(!_paredDibujando)return;
    _paredDibujando.x2=x2; _paredDibujando.y2=y2;
    var svgs=el.querySelectorAll('svg');
    var last=svgs[svgs.length-1];
    if(last){var ls=last.querySelectorAll('line');var ll=ls[ls.length-1];
      if(ll&&ll.getAttribute('stroke-dasharray')){ll.setAttribute('x2',x2);ll.setAttribute('y2',y2);}}
  }

  // ── TOUCH EVENTS (mobile - no delay) ──────────────────────────────────────
  el.addEventListener('touchstart',function(e){
    var mn=e.target.closest('.mesa-node');
    if(modoParedes){
      if(mn||e.target.closest('#paredes-ui'))return;
      var c=getCoords(e);
      _paredDibujando={x1:c.x,y1:c.y,x2:c.x,y2:c.y};
      e.preventDefault();return;
    }
    if(mn&&modoEdicion){
      var t=e.touches[0];
      dragState={id:parseInt(mn.getAttribute('data-mesaid')),sx:t.clientX,sy:t.clientY};
    }
  },{passive:false});

  el.addEventListener('touchmove',function(e){
    if(modoParedes&&_paredDibujando){
      var c=getCoords(e); updatePreview(c.x,c.y);
      e.preventDefault();return;
    }
    if(dragState){
      var t=e.touches[0];
      var dx=t.clientX-dragState.sx, dy=t.clientY-dragState.sy;
      dragState.sx=t.clientX; dragState.sy=t.clientY;
      var m=mesas.find(function(m){return m.id===dragState.id;});
      if(m){m.x=Math.max(0,m.x+dx);m.y=Math.max(0,m.y+dy);}
      var node=document.getElementById('mn-'+dragState.id);
      if(node&&m){node.style.left=m.x+'px';node.style.top=m.y+'px';}
      e.preventDefault();
    }
  },{passive:false});

  el.addEventListener('touchend',function(e){
    if(modoParedes&&_paredDibujando){
      var c=getCoords(e.changedTouches?{touches:e.changedTouches}:e);
      savePared(c.x,c.y); return;
    }
    if(dragState){fbSet('mesas',mesasObj());dragState=null;return;}
    // Mesa click (touchend = tap)
    var mn=e.target.closest('.mesa-node');
    if(mn){
      e.preventDefault();
      var mid=parseInt(mn.getAttribute('data-mesaid'));
      if(modoEdicion){abrirEditorMesa(mid);}else{clickMesa(mid);}
    }
  },{passive:false});

  // ── MOUSE EVENTS (desktop) ────────────────────────────────────────────────
  el.addEventListener('mousedown',function(e){
    if(modoParedes){
      if(e.target.closest('.mesa-node')||e.target.closest('#paredes-ui'))return;
      var c=getCoords(e);
      _paredDibujando={x1:c.x,y1:c.y,x2:c.x,y2:c.y};
      e.preventDefault();return;
    }
    var mn=e.target.closest('.mesa-node');
    if(mn&&modoEdicion){
      dragState={id:parseInt(mn.getAttribute('data-mesaid')),sx:e.clientX,sy:e.clientY};
      e.preventDefault();
    }
  });
  el.addEventListener('mousemove',function(e){
    if(modoParedes&&_paredDibujando){var c=getCoords(e);updatePreview(c.x,c.y);return;}
    if(dragState){
      var dx=e.clientX-dragState.sx, dy=e.clientY-dragState.sy;
      dragState.sx=e.clientX; dragState.sy=e.clientY;
      var m=mesas.find(function(m){return m.id===dragState.id;});
      if(m){m.x=Math.max(0,m.x+dx);m.y=Math.max(0,m.y+dy);}
      var node=document.getElementById('mn-'+dragState.id);
      if(node&&m){node.style.left=m.x+'px';node.style.top=m.y+'px';}
    }
  });
  el.addEventListener('mouseup',function(e){
    if(modoParedes&&_paredDibujando){var c=getCoords(e);savePared(c.x,c.y);return;}
    if(dragState){fbSet('mesas',mesasObj());dragState=null;}
  });
  el.addEventListener('mouseleave',function(){
    if(dragState){fbSet('mesas',mesasObj());dragState=null;}
    _paredDibujando=null;
  });
  el.addEventListener('click',function(e){
    // Mesa click only - paredes handled by document listener
    if(modoParedes)return;
    var mn=e.target.closest('.mesa-node');
    if(!mn)return;
    var mid=parseInt(mn.getAttribute('data-mesaid'));
    if(modoEdicion){abrirEditorMesa(mid);}else{clickMesa(mid);}
  });
}




function mesasObj(){var o={};mesas.forEach(function(m){o[m.id]=m;});return o;}
function clickMesa(id){
  if(modoEdicion)return;
  if(modoParedes){modoParedes=false;}
  var m=mesas.find(function(m){return m.id===id;});
  mesaActiva=mesaActiva&&mesaActiva.id===id?null:m;
  catFiltroPed='Todos';
  render();
  if(mesaActiva){
    setTimeout(function(){
      var pp=document.getElementById('panel-pedido');
      if(pp)pp.scrollIntoView({behavior:'smooth',block:'start'});
    },150);
  }
}
function dblMesa(id){if(!modoEdicion)return;abrirEditorMesa(id);}
function cerrarPanel(){mesaActiva=null;render();}

function abrirTrasladoMesa(){
  if(!mesaActiva)return;
  var origen=mesaActiva;
  // Build list of available target mesas (different from current, in any zone)
  var disponibles=mesas.filter(function(m){
    return m.id!==origen.id;
  });
  var zonaGroups={};
  disponibles.forEach(function(m){
    if(!zonaGroups[m.zona])zonaGroups[m.zona]=[];
    zonaGroups[m.zona].push(m);
  });
  var mesaOpts=Object.keys(zonaGroups).map(function(z){
    var zona=ZONAS.find(function(x){return x.id===z;});
    return'<optgroup label="'+(zona?zona.label:z)+'">'+zonaGroups[z].map(function(m){
      var tieneped=(pedidos[m.id]&&pedidos[m.id].length>0);
      return'<option value="'+m.id+'">'+(m.nombre||'Mesa '+m.num)+(tieneped?' ⚠️ ocupada':'')+'</option>';
    }).join('')+'</optgroup>';
  }).join('');

  modal2('<div style="text-align:center;margin-bottom:16px">'
    +'<div style="font-size:24px">🔀</div>'
    +'<div style="font-weight:800;font-size:16px">Trasladar mesa</div>'
    +'<div style="color:var(--muted);font-size:12px;margin-top:4px">Desde: '+(origen.nombre||'Mesa '+origen.num)+'</div></div>'
    +'<div style="margin-bottom:16px">'
      +'<div style="color:var(--muted);font-size:12px;margin-bottom:6px">Mover pedido a:</div>'
      +'<select class="inp" id="traslado-dest"><option value="">— Selecciona mesa destino —</option>'+mesaOpts+'</select>'
    +'</div>'
    +'<div style="background:#f5a62318;border:1px solid #f5a62333;border-radius:8px;padding:8px 12px;margin-bottom:14px;font-size:12px;color:#f5a623">'
      +'⚠️ Si la mesa destino ya tiene pedido, los items se fusionan.'
    +'</div>'
    +'<div style="display:flex;gap:8px">'
      +'<button class="btn btn-outline btn-full" onclick="closeModal2()">Cancelar</button>'
      +'<button class="btn btn-green btn-full" onclick="confirmarTrasladoMesa()">✅ Trasladar</button>'
    +'</div>');
}

function confirmarTrasladoMesa(){
  if(!mesaActiva)return;
  var destId=parseInt((document.getElementById('traslado-dest')||{}).value);
  if(!destId){alert('Selecciona la mesa destino.');return;}
  var destMesa=mesas.find(function(m){return m.id===destId;});
  if(!destMesa){alert('Mesa no encontrada.');return;}
  var origenId=mesaActiva.id;
  // Merge pedidos
  var pedOrigen=pedidos[origenId]||[];
  var pedDest=pedidos[destId]||[];
  // Combine: if same product exists in dest, sum quantities
  pedOrigen.forEach(function(it){
    var existe=pedDest.findIndex(function(d){return d.pid===it.pid&&d.cubeta===it.cubeta;});
    if(existe>=0) pedDest[existe].qty+=it.qty;
    else pedDest.push(it);
  });
  // Save dest pedido, clear origen
  pedidos[destId]=pedDest;
  pedidos[origenId]=[];
  var r1=ref('pedidos/'+destId); if(r1)r1.set(pedDest);
  var r2=ref('pedidos/'+origenId); if(r2)r2.set(null);
  // Switch active mesa to destination
  mesaActiva=destMesa;
  closeModal2();
  render();
  actualizarColorMesas();
  updateHeader();
}

function toggleEdicion(){modoEdicion=!modoEdicion;modoParedes=false;mesaActiva=null;render();}

function deshacerPared(){

function abrirCobro(){
  if(!mesaActiva)return;
  var ped=pedidos[mesaActiva.id]||[];
  var total=totalPedido(mesaActiva.id);

      else{var p=menu.find(function(m){return m.id===it.pid;});nombre=(it.cubeta?'🪣 ':'')+esc((p&&p.nombre)||'?');pr=it.cubeta?(p&&p.cubeta||((p&&p.precio||0)*5)):((p&&p.precio)||0);}

      return'<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)" data-fpid="'+fid+'">'

        +'<span style="color:'+f.color+';font-weight:700;font-size:13px;flex:1">'+f.label+'</span>'
        +'<div style="display:flex;align-items:center;gap:5px">'
        +'<button data-act="minus" data-fpid="'+fid+'" style="background:var(--dim);color:var(--muted);border:none;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:13px;font-weight:700">−</button>'
        +'<input type="number" id="fp-inp-'+fid+'" value="'+(val||'')+'" placeholder="0"'
        +' data-fpid="'+fid+'" data-act="input"'
        +' style="width:90px;background:var(--bg);border:1px solid '+(val>0?f.color:'var(--border)')+';border-radius:7px;padding:5px 8px;color:var(--text);font-size:13px;font-weight:700;text-align:right;outline:none"/>'
        +'<button data-act="plus" data-fpid="'+fid+'" style="background:var(--dim);color:var(--muted);border:none;border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:13px;font-weight:700">+</button>'
        +'<button data-act="todo" data-fpid="'+fid+'" style="background:'+f.color+'22;color:'+f.color+';border:1px solid '+f.color+'44;border-radius:5px;padding:4px 8px;cursor:pointer;font-size:11px;font-weight:700">Todo</button>'
        +'</div></div>';
    }).join('');

    var pagosResumen=Object.entries(window._pagosParciales).filter(function(kv){return kv[1]>0;}).map(function(kv){
      var f=FPAGO.find(function(x){return x.id===kv[0];});
      return'<span style="background:'+(f?f.color:'#fff')+'22;color:'+(f?f.color:'#fff')+';border:1px solid '+(f?f.color:'#fff')+'33;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700">'+(f?f.emoji+' ':'')+fmt(kv[1])+'</span>';
    }).join(' ');

    return'<div style="text-align:center;margin-bottom:14px">'
      +'<div style="font-size:22px">🛸</div>'
      +'<div style="color:var(--muted);font-size:12px;margin-top:3px">'+(zona?zona.label:'')+' · '+esc(mesaActiva.nombre||'Mesa '+mesaActiva.num)+'</div>'
      +'<div style="font-size:26px;font-weight:900;margin-top:4px">'+fmt(total)+'</div>'
      +'<div style="color:var(--muted);font-size:12px">Total a cobrar</div></div>'

      if(act==='minus')ajustarPago(fid,-1000);
      if(act==='plus') ajustarPago(fid,1000);
      if(act==='todo') llenarConPendiente(fid);
    });

      if(e.target.getAttribute('data-act')==='input'){

function setPago(fpId, rawVal){
  var val=parseInt(rawVal)||0;
  if(val<0)val=0;
  window._pagosParciales[fpId]=val;
  var el=document.getElementById('fp-inp-'+fpId);
  var f=FPAGO.find(function(x){return x.id===fpId;});
  if(el&&f)el.style.borderColor=val>0?f.color:'var(--border)';
  actualizarBarraCobro();
}

function ajustarPago(fpId, delta){
  var cur=window._pagosParciales[fpId]||0;
  var nuevo=Math.max(0,cur+delta);
  window._pagosParciales[fpId]=nuevo;
  var el=document.getElementById('fp-inp-'+fpId);
  if(el){el.value=nuevo||'';var f=FPAGO.find(function(x){return x.id===fpId;});if(f)el.style.borderColor=nuevo>0?f.color:'var(--border)';}
  actualizarBarraCobro();
}

function llenarConPendiente(fpId){
  var pagado=Object.entries(window._pagosParciales).filter(function(kv){return kv[0]!==fpId;}).reduce(function(a,kv){return a+(kv[1]||0);},0);
  var pendiente=Math.max(0,window._totalCobro-pagado);
  window._pagosParciales[fpId]=pendiente;
  var el=document.getElementById('fp-inp-'+fpId);
  if(el){el.value=pendiente||'';var f=FPAGO.find(function(x){return x.id===fpId;});if(f)el.style.borderColor=pendiente>0?f.color:'var(--border)';}
  actualizarBarraCobro();
}

function actualizarBarraCobro(){
  var pagado=Object.values(window._pagosParciales).reduce(function(a,v){return a+(v||0);},0);
  var total=window._totalCobro;
  var pendiente=total-pagado;
  var completo=Math.round(pendiente)<=0;
  var pct=Math.min(100,Math.round(pagado/total*100));

  // Update progress bar
  var bar=document.querySelector('#modal1 .btn-full[onclick="confirmarCobro()"]');
  if(bar)bar.disabled=!completo;

  var barra=document.querySelector('#modal1 div[style*="height:6px"]>div');
  if(barra){barra.style.width=pct+'%';barra.style.background=completo?'#22c55e':'#f5a623';}

  // Update pagado/pendiente text
  var spans=document.querySelectorAll('#modal1 span[style*="font-weight:700"]');
  if(spans.length>=2){
    spans[0].textContent='Pagado: '+fmt(pagado);
    spans[1].style.color=completo?'#22c55e':'#f5a623';
    spans[1].textContent=completo?'✓ Completo':'Pendiente: '+fmt(pendiente);
  }
}

function confirmarCobro(){
  if(!mesaActiva)return;
  var pagos=window._pagosParciales||{};
  var pagado=Object.values(pagos).reduce(function(a,v){return a+(v||0);},0);
  var total=totalPedido(mesaActiva.id);
  // Apply discount if exists
  var descMesa=descuentos[mesaActiva.id];
  if(descMesa&&descMesa.pct) total=Math.round(total*(1-descMesa.pct/100));
  if(Math.round(pagado)<Math.round(total)){alert('El total pagado ($'+total.toLocaleString('es-CO')+') no cubre el valor. Verifica los montos.');return;}

  var mesa=mesaActiva;
  var ped=pedidos[mesa.id]||[];

  // Build venta with multiple payments
  var pagosList=Object.entries(pagos).filter(function(kv){return kv[1]>0;}).map(function(kv){
    var f=FPAGO.find(function(x){return x.id===kv[0];});
    return{fp:kv[0],label:(f?f.label:''),monto:kv[1]};
  });
  var fpPrincipal=pagosList.length===1?pagosList[0].fp:'mixto';
  var fpLabel=pagosList.length===1?pagosList[0].label:pagosList.map(function(p){return p.label+' '+fmt(p.monto);}).join(' + ');

  var venta={
    mesa:mesa.nombre||('Mesa '+mesa.num),zona:mesa.zona,
    ts:Date.now(),total:total,
    items:JSON.parse(JSON.stringify(ped)),
    fp:fpPrincipal,fpLabel:fpLabel,
    pagos:pagosList,
    uid:usuarioActivo.id,uidNombre:usuarioActivo.nombre
  };
  fbPush('ventas',venta);
  ped.forEach(function(it){
    if(it.isCustom) return;
    if(it.isCombo&&it.comboIngredientes){
      it.comboIngredientes.forEach(function(ing){
        var cant=(ing.cantidad||1)*it.qty;
        // Producto del menú
        if(ing.prodId!=null){
          var p=menu.find(function(m){return Number(m.id)===Number(ing.prodId);});
          if(p){
            var antes=parseInt(p.stock); if(isNaN(antes))antes=0;
            p.stock=Math.max(0,antes-cant);
          }
        }
        // Ingrediente de cocina
        if(ing.ingId!=null){
          var ingI=ingredientes.find(function(i){return Number(i.id)===Number(ing.ingId);});
          if(ingI){
            var antesI=parseInt(ingI.stock); if(isNaN(antesI))antesI=0;
            ingI.stock=Math.max(0,antesI-cant);guardarIngredientes();
          }
        }
      });
    } else {
      var p=menu.find(function(m){return m.id===it.pid;});
      if(p){
        var c=it.cubeta?it.qty*5:it.qty;
        // Discount the product itself (coerce stock to number)
        p.stock=Math.max(0,(parseInt(p.stock)||0)-c);
        // Also discount recipe ingredients if product has a recipe
        if(p.receta&&p.receta.length){
          p.receta.forEach(function(ri){
            // Check both menu and ingredientes
            var ing=menu.find(function(m){return m.id==ri.pid;});
            if(ing){ing.stock=Math.max(0,(parseInt(ing.stock)||0)-(ri.cantidad*c));}
            else{
              var ingI=ingredientes.find(function(i){return i.id==ri.pid;});
              if(ingI){ingI.stock=Math.max(0,(parseInt(ingI.stock)||0)-(ri.cantidad*c));guardarIngredientes();}
            }
          });
        }
      }
    }
  });
  var mo={};menu.forEach(function(m){mo[m.id]=m;});fbSet('menu',mo);
  imprimirTicket(mesa,ped,total,pagosList);

  var r=ref('pedidos/'+mesa.id);if(r)r.set(null);
  mesaActiva=null;closeModal1();render();
}

function sumarStock(id){
  var el=document.getElementById('ent-'+id);if(!el)return;

  if(p){p.stock+=cant;el.value='';var mo={};menu.forEach(function(m){mo[m.id]=m;});fbSet('menu',mo);render();}

function guardarStock(id){

// Event delegation for admin config buttons
function bindAdminEvents(){
  var c=document.getElementById('content');
  if(!c||c._adminBound)return;
  c._adminBound=true;
  c.addEventListener('click',function(e){
    var btn=e.target.closest('[data-act]');if(!btn)return;
    var act=btn.getAttribute('data-act');
    var uid=btn.getAttribute('data-uid');
    if(act==='edituser'&&uid){editarUsuario(uid);return;}
    if(act==='deluser'&&uid){borrarUsuario(uid);return;}
    if(act==='del-rec'){
      var rIdx=parseInt(btn.getAttribute('data-ridx'));
      var prod=editandoProd&&editandoProd!=='nuevo'?menu.find(function(m){return m.id===editandoProd;}):null;
      if(prod&&prod.receta){
        prod.receta.splice(rIdx,1);
        var mo={};menu.forEach(function(m){mo[m.id]=m;});fbSet('menu',mo);
        render();
      }
      return;
    }
    var iid2=btn.getAttribute('data-iid');
    if(act==='rename-cat'){
      abrirRenombrarCategoria(btn.getAttribute('data-cat'));return;
    }
    if(act==='set-cat-emoji'){
      abrirEmojiCategoria(btn.getAttribute('data-cat'));return;
    }
    if(act==='del-ing'&&iid2){
      if(!confirm('¿Eliminar este ingrediente?'))return;
      ingredientes=ingredientes.filter(function(x){return x.id!==iid2;});
      guardarIngredientes();
      closeModal2();render();return;
    }
    var sid=btn.getAttribute('data-sid');
    if(act==='delsocio'&&sid){
      if(!confirm('¿Eliminar este consumo?'))return;
      consumoSocios=consumoSocios.filter(function(c){return c.id!==sid;});
      var r=ref('consumoSocios');
      if(r)r.set(consumoSocios.length?consumoSocios:null);
      render();return;
    }
    if(act==='setfont'){
      ticketConfig.fontSize=parseInt(btn.getAttribute('data-fs'));
      render();
    }
    if(act==='setpaper'){
      ticketConfig.paperWidth=parseInt(btn.getAttribute('data-pw'));
      render();
    }
  });
}

function getCatEmoji(cat){
  if(CAT_EMOJI_MAP[cat]) return CAT_EMOJI_MAP[cat];
  // case-insensitive fallback
  var cl=cat.toLowerCase();
  for(var k in CAT_EMOJI_MAP){if(k.toLowerCase()===cl)return CAT_EMOJI_MAP[k];}
  return '';
}

  // Show what categories exist vs what we have mapped
  var cats=menu.reduce(function(a,p){if(a.indexOf(p.cat)<0)a.push(p.cat);return a;},[]).sort();
  var mapped=cats.filter(function(c){return getCatEmoji(c);});
  var unmapped=cats.filter(function(c){return !getCatEmoji(c);});
  var msg='Categorías encontradas: '+cats.length;
  msg+='\nCon emoji asignado: '+mapped.length;
  if(unmapped.length) msg+='\nSin mapear: '+unmapped.join(', ');
  msg+='\n\n¿Continuar y actualizar TODOS los productos?';
  if(!confirm(msg))return;
  var count=0;
  menu.forEach(function(p){
    var ce=getCatEmoji(p.cat);
    if(ce){p.emoji=ce;count++;}
  });
  Object.keys(CAT_EMOJI_MAP).forEach(function(cat){catEmojis[cat]=CAT_EMOJI_MAP[cat];});
  var mo={};menu.forEach(function(m){mo[m.id]=m;});
  fbSet('menu',mo);
  fbSet('catEmojis',catEmojis);
  render();
  alert('✅ '+count+' productos actualizados de '+cats.length+' categorías.');
}

function exportarInventarioExcel(){
  // Build CSV with BOM for Excel UTF-8 compatibility
  var rows = [['Categoría','Nombre','Emoji','Precio','Stock','Unidad','Es Cerveza','Cubetazo','Descripción']];
  
  // Sort by category then name
  var sorted = menu.slice().sort(function(a,b){
    return (a.cat||'').localeCompare(b.cat||'') || (a.nombre||'').localeCompare(b.nombre||'');
  });
  
  sorted.forEach(function(p){
    rows.push([
      p.cat||'',
      p.nombre||'',
      p.emoji||'',
      p.precio||0,
      p.stock||0,
      p.und||'und',
      p.esCerveza?'Sí':'No',
      p.cubeta||0,
      p.descripcion||''
    ]);
  });

  // Ingredientes section
  if(ingredientes.length){
    rows.push([]);
    rows.push(['── INGREDIENTES DE COCINA ──','','','','','','','','']);
    rows.push(['Nombre','','','','Stock','Unidad','','','']);
    ingredientes.forEach(function(i){
      rows.push([i.nombre||'','','','',i.stock||0,i.und||'und','','','']);
    });
  }

  var csv = '﻿'; // BOM
  rows.forEach(function(r){
    csv += r.map(function(v){
      var s = String(v).replace(/"/g,'""');
      return (s.indexOf(',')>=0||s.indexOf('"')>=0)?'"'+s+'"':s;
    }).join(',') + '\r\n';
  });

  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'Area52-Inventario-' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

    +'<div style="font-weight:800;font-size:16px;color:var(--gold)">'+esc(cb.nombre)+'</div>'
    +'<div style="color:var(--muted);font-size:12px;margin-top:4px">Paso '+(step+1)+' de '+catIngs.length+'</div></div>'
    +'<div style="background:var(--accent)18;border:1px solid var(--accent)33;border-radius:10px;padding:10px 14px;margin-bottom:14px">'
      +'<div style="color:var(--accent);font-weight:700;font-size:13px">Elige '+ing.cantidad+' '+ing.cat+' ('+ing.cat+' a elección)</div>'
      +'<div style="color:var(--muted);font-size:11px;margin-top:2px">¿Cuál '+ing.cat.toLowerCase()+' prefiere el cliente?</div>'
    +'</div>'

      selecciones.push({catIng:ing, prodId:pid});

function confirmarComboEnPedido(cb, selecciones){
  // Build final ingredient list (replacing categoria with chosen products)
  var finalIngs=[];
  var selIdx=0;
  cb.ingredientes.forEach(function(ing){
    if(ing.tipo==='categoria'){
      var sel=selecciones[selIdx++];
      if(sel){
        var p=menu.find(function(m){return m.id===sel.prodId;});
        finalIngs.push({tipo:'producto',prodId:sel.prodId,cantidad:ing.cantidad,
          nombre:p?p.nombre:'?',emoji:p?p.emoji:'?',und:p?p.und:'und'});
      }
    } else {
      finalIngs.push(ing);
    }
  });

  // Check stock for all final ingredients
  var ok=finalIngs.every(function(ing){
    var p=menu.find(function(m){return m.id===ing.prodId;});
    return p&&p.stock>=ing.cantidad;
  });
  if(!ok){alert('Stock insuficiente para alguno de los productos elegidos.');return;}

  var id=mesaActiva.id;
  if(!pedidos[id])pedidos[id]=[];
  // Each combo addition is unique (different product choices) — always push new
  pedidos[id].push({
    pid:'combo_'+cb.id+'_'+Date.now(),
    cubeta:false,qty:1,isCombo:true,
    comboId:cb.id,comboNombre:cb.nombre,comboEmoji:cb.emoji,
    comboPrecio:cb.precio,comboIngredientes:finalIngs
  });
  var r=ref('pedidos/'+id);if(r)r.set(pedidos[id]);
  renderSoloPedido();updateHeader();actualizarColorMesas();
}

function guardarProd(){
  var nombre=(document.getElementById('f-nombre')||{}).value;nombre=nombre?nombre.trim():'';
  var precio=parseInt((document.getElementById('f-precio')||{}).value)||0;
  var cat=((document.getElementById('f-cat')||{}).value||'').trim();
  var stock=parseInt((document.getElementById('f-stock')||{}).value)||0;
  var und=(document.getElementById('f-und')||{}).value||'und';
  var cerv=!!((document.getElementById('f-cerveza')||{}).checked);
  var esComida=!!((document.getElementById('f-comida')||{}).checked);
  var descripcion=((document.getElementById('f-desc')||{}).value||'').trim();
  // Read variantes from dynamic rows
  var variantes=[];
  document.querySelectorAll('[data-vnom]').forEach(function(el){
    var vi=el.getAttribute('data-vnom');
    var nom=el.value.trim();
    var preEl=document.querySelector('[data-vpre="'+vi+'"]');
    var pre=preEl?parseInt(preEl.value)||0:0;
    if(nom&&pre>0) variantes.push({nombre:nom,precio:pre});
  });
  var cubeta=cerv?(parseInt((document.getElementById('f-cubeta')||{}).value)||null):null;
  var emoji=(document.getElementById('f-emoji')||{}).value||'🍺';
  if(!nombre){alert('Escribe el nombre.');return;}
  if(!precio){alert('Escribe el precio.');return;}
  if(!cat){alert('Escribe la categoría.');return;}
  if(editandoProd==='nuevo'){
    var maxId=0;menu.forEach(function(m){if(m.id>maxId)maxId=m.id;});
    menu.push({id:maxId+1,nombre:nombre,precio:precio,cubeta:cubeta,esCerveza:cerv,esComida:esComida,descripcion:descripcion,variantes:variantes,cat:cat,emoji:emoji,stock:stock,und:und,receta:_recetaTemp||[]});
    _recetaTemp=[];
  } else {
    for(var i=0;i<menu.length;i++){if(menu[i].id===editandoProd){menu[i]=Object.assign({},menu[i],{nombre:nombre,precio:precio,cubeta:cubeta,esCerveza:cerv,esComida:esComida,descripcion:descripcion,variantes:variantes,cat:cat,emoji:emoji,stock:stock,und:und});break;}}
  }
  editandoProd=null;var mo={};menu.forEach(function(m){mo[m.id]=m;});fbSet('menu',mo);render();
}

        +'<button class="btn btn-outline btn-full" onclick="cancelarCombo()">Cancelar</button>'
      +'</div></div>';
  } else {
    formHtml='<div class="mb12"><button class="btn btn-sm btn-green" onclick="nuevoCombo()">🎁 Nuevo combo</button></div>';
  }

  // ── Lista de combos ───────────────────
  var lista=combos.length===0
    ?'<div style="color:var(--dim);text-align:center;padding:24px;font-size:13px;background:var(--card);border-radius:12px;border:1px solid var(--border)">Sin combos creados aún</div>'
    :'<div class="prod-grid">'+combos.map(function(cb){
      // Check stock availability
      var disponible=cb.ingredientes.every(function(ing){
        if(ing.tipo==='categoria'){
          // At least one product in category has enough stock
          return menu.filter(function(m){return m.cat===ing.cat;})
            .some(function(p){return p.stock>=ing.cantidad;});
        }
        var p=menu.find(function(m){return m.id===ing.prodId;});
        return p&&p.stock>=ing.cantidad;
      });
      var ingList=cb.ingredientes.map(function(ing){
        if(ing.tipo==='categoria'){
          return'<div style="font-size:11px;color:#38bdf8">🗂️ '+esc(ing.cat)+' ×'+ing.cantidad+' (a elección)</div>';
        }
        var p=menu.find(function(m){return m.id===ing.prodId;});
        return'<div style="font-size:11px;color:var(--muted)">'+(p?p.emoji+' ':'')+esc((p&&p.nombre)||'?')+' ×'+ing.cantidad+'</div>';
      }).join('');
      return'<div class="prod-card" style="border-color:'+(editandoCombo===cb.id?'var(--accent)':'var(--border)')+(disponible?'':';opacity:.5')+'">'
        +'<span style="font-size:28px">'+cb.emoji+'</span>'
        +'<div style="flex:1">'
          +'<div style="font-weight:800;font-size:13px">'+esc(cb.nombre)+'</div>'
          +'<div style="color:var(--gold);font-size:15px;font-weight:900;margin:2px 0">'+fmt(cb.precio)+'</div>'
          +ingList
          +(disponible
            ?'<div style="color:#22c55e;font-size:10px;margin-top:3px;font-weight:700">✓ Disponible</div>'
            :'<div style="color:#ef4444;font-size:10px;margin-top:3px;font-weight:700">✗ Stock insuficiente</div>')
        +'</div>'
        +(esAdmin?'<div style="display:flex;flex-direction:column;gap:4px">'
          +'<button data-act="editcombo" data-cbid="'+cb.id+'" style="background:#38bdf818;color:#38bdf8;border:none;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11px;font-weight:700">✏️</button>'
          +'<button data-act="delcombo" data-cbid="'+cb.id+'" style="background:#ef444418;color:#ef4444;border:none;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:11px;font-weight:700">🗑</button>'
          +'</div>':'')
        +'</div>';
    }).join('')+'</div>';

  return formHtml
    +(combos.length?'<div class="section-title" style="margin-bottom:10px">Combos disponibles ('+combos.length+')</div>':'')
    +lista;
}

// Temp storage while editing a combo
var _comboTemp={ingredientes:[]};

function nuevoCombo(){
  editandoCombo='nuevo';
  _comboTemp={ingredientes:[]};
  render();setTimeout(bindComboEmojiPicker,50);
}
function cancelarCombo(){editandoCombo=null;render();}
function editarCombo(id){
  editandoCombo=id;
  var c=combos.find(function(x){return x.id===id;});
  _comboTemp={ingredientes:c?JSON.parse(JSON.stringify(c.ingredientes)):[]};
  render();setTimeout(bindComboEmojiPicker,50);
}
function borrarCombo(id){
  if(!confirm('¿Eliminar este combo?'))return;
  combos=combos.filter(function(c){return c.id!==id;});
  var co={};combos.forEach(function(c){co[c.id]=c;});fbSet('combos',co);render();
}

function bindComboEmojiPicker(){
  var picker=document.getElementById('combo-emoji-picker');
  if(!picker||picker._bound)return;
  picker._bound=true;
  picker.addEventListener('click',function(e){
    var btn=e.target.closest('[data-cei]');if(!btn)return;
    var COMBO_EMOJIS=['🎁','🎉','🍻','🥃','🍺','🍷','🍹','🎊','⭐','🔥','💫','🎯'];
    var e2=COMBO_EMOJIS[parseInt(btn.getAttribute('data-cei'))];
    if(!e2)return;
    var hid=document.getElementById('cb-emoji');if(hid)hid.value=e2;
    picker.querySelectorAll('[data-cei]').forEach(function(b){
      var sel=b===btn;
      b.style.background=sel?'#a855f722':'transparent';
      b.style.border=sel?'2px solid #a855f7':'2px solid transparent';
    });
  });
}

function limpiarCatSel(){var s=document.getElementById('cb-cat-sel');if(s)s.value='';}
function limpiarProdSel(){var s=document.getElementById('cb-prod-sel');if(s)s.value='';}

function agregarIngCombo(){
  var prodSel=document.getElementById('cb-prod-sel');
  var catSel=document.getElementById('cb-cat-sel');
  var cantEl=document.getElementById('cb-prod-cant');
  if(!cantEl)return;
  var cant=parseInt(cantEl.value)||1;
  if(cant<1){alert('La cantidad debe ser al menos 1.');return;}

  var prodVal=prodSel?prodSel.value:'';
  var catVal=catSel?catSel.value:'';

  if(!prodVal&&!catVal){alert('Selecciona un producto específico o una categoría.');return;}

  if(prodVal){
    if(prodVal.startsWith('ing:')){
      // Ingrediente cocina
      var ingId=prodVal.replace('ing:','');
      var ingItem=ingredientes.find(function(i){return i.id===ingId;});
      if(!ingItem){alert('Ingrediente no encontrado.');return;}
      var existeI=_comboTemp.ingredientes.findIndex(function(i){return i.tipo==='ingrediente'&&i.ingId===ingId;});
      if(existeI>=0){_comboTemp.ingredientes[existeI].cantidad+=cant;}
      else{_comboTemp.ingredientes.push({tipo:'ingrediente',ingId:ingId,cantidad:cant,
        nombre:ingItem.nombre,emoji:'🧂',und:ingItem.und});}
    } else {
      // Specific product: value = "prod:ID"
      var prodId=parseInt(prodVal.replace('prod:',''));
      if(!prodId){alert('Selecciona un producto válido.');return;}
      var existe=_comboTemp.ingredientes.findIndex(function(i){return i.tipo==='producto'&&i.prodId===prodId;});
      if(existe>=0){_comboTemp.ingredientes[existe].cantidad+=cant;}
      else{
        var p=menu.find(function(m){return m.id===prodId;});
        _comboTemp.ingredientes.push({tipo:'producto',prodId:prodId,cantidad:cant,
          nombre:p?p.nombre:'?',emoji:p?p.emoji:'?',und:p?p.und:'und'});
      }
    }
  } else {
    // Category: value = "cat:Cervezas"
    var cat=catVal.replace('cat:','');
    var existe2=_comboTemp.ingredientes.findIndex(function(i){return i.tipo==='categoria'&&i.cat===cat;});
    if(existe2>=0){_comboTemp.ingredientes[existe2].cantidad+=cant;}
    else{_comboTemp.ingredientes.push({tipo:'categoria',cat:cat,cantidad:cant});}
  }

  if(prodSel)prodSel.value='';
  if(catSel)catSel.value='';
  cantEl.value=1;
  render();setTimeout(bindComboEmojiPicker,50);
}

function quitarIngCombo(idx){
  _comboTemp.ingredientes.splice(idx,1);
  render();setTimeout(bindComboEmojiPicker,50);
}

function cambiarCantIngCombo(idx,val){
  var cant=parseInt(val)||1;
  if(cant<1)cant=1;
  _comboTemp.ingredientes[idx].cantidad=cant;
}

function actualizarInfoCombo(){
  var precio=parseInt((document.getElementById('cb-precio')||{}).value)||0;
  var costoEl=document.getElementById('cb-costo');
  var ahorroEl=document.getElementById('cb-ahorro');
  if(costoEl){
    var costoAprox=_comboTemp.ingredientes.reduce(function(a,ing){
      var p=menu.find(function(m){return m.id===ing.prodId;});
      return a+(p?p.precio*ing.cantidad:0);
    },0);
    costoEl.textContent=fmt(costoAprox);
    if(ahorroEl)ahorroEl.textContent=fmt(Math.max(0,costoAprox-precio));
  }
}

function guardarCombo(){
  var nombre=((document.getElementById('cb-nombre')||{}).value||'').trim();
  var precio=parseInt((document.getElementById('cb-precio')||{}).value)||0;
  var emoji=(document.getElementById('cb-emoji')||{}).value||'🎁';
  if(!nombre){alert('Escribe el nombre del combo.');return;}
  if(!precio||precio<=0){alert('Escribe el precio de venta.');return;}
  if(!_comboTemp.ingredientes.length){alert('Agrega al menos un ingrediente al combo.');return;}
  var obj={
    id:editandoCombo==='nuevo'?'cb'+Date.now():editandoCombo,
    nombre:nombre,precio:precio,emoji:emoji,
    ingredientes:JSON.parse(JSON.stringify(_comboTemp.ingredientes))
  };
  if(editandoCombo==='nuevo'){combos.push(obj);}
  else{var idx=combos.findIndex(function(c){return c.id===editandoCombo;});if(idx>=0)combos[idx]=obj;}
  var co={};combos.forEach(function(c){co[c.id]=c;});fbSet('combos',co);
  editandoCombo=null;render();
}

function fmtFecha(ts){
  var d=new Date(ts);
  return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();
}

function exportarGastosExcel(){
  var rows=[['Fecha','Hora','Concepto','Categoría','Forma de pago','Valor','Usuario','Notas']];
  var sorted=gastos.slice().sort(function(a,b){return b.ts-a.ts;});
  sorted.forEach(function(g){
    var f=FPAGO.find(function(x){return x.id===g.fp;});
    var d=new Date(g.ts);
    rows.push([
      ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear(),
      ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2),
      g.concepto||'',
      g.categoria||'',
      f?f.label:(g.fp||''),
      g.valor||0,
      g.uidNombre||g.uid||'',
      g.notas||''
    ]);
  });
  // Total row
  var total=sorted.reduce(function(a,g){return a+g.valor;},0);
  rows.push([]);
  rows.push(['','','','','TOTAL',total,'','']);

  var csv='﻿';
  rows.forEach(function(r){
    csv+=r.map(function(v){
      var s=String(v).replace(/"/g,'""');
      return (s.indexOf(',')>=0||s.indexOf('"')>=0)?'"'+s+'"':s;
    }).join(',')+'\r\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='Area52-Gastos-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function guardarCajaInicial(){
  var total=0;
  document.querySelectorAll('[data-fp-ini]').forEach(function(el){
    var fp=el.getAttribute('data-fp-ini');
    var v=parseInt(el.value)||0;
    cajaHoy['ini_'+fp]=v;
    total+=v;
  });
  cajaHoy.cajaInicial=total;
  fbSet('cajaHoy',cajaHoy);
  if(!turnoInicio){turnoInicio=Date.now();fbSet('turnoInicio',turnoInicio);}
  render();
}

function abrirCierre(){
  var hoyV=ventasTurno();
  var hoyG=gastosTurno();
  var totalV=hoyV.reduce(function(a,v){return a+v.total;},0);
  var totalG=hoyG.reduce(function(a,g){return a+g.valor;},0);
  var porFP={};
  hoyV.forEach(function(v){
    if(v.pagos&&v.pagos.length){
      v.pagos.forEach(function(p){porFP[p.fp]=(porFP[p.fp]||0)+p.monto;});
    } else {
      porFP[v.fp]=(porFP[v.fp]||0)+v.total;
    }
  });
  var utilidad=cajaHoy.cajaInicial+totalV-totalG;
  var mesasOcup=mesas.filter(function(m){return pedidos[m.id]&&pedidos[m.id].length>0;}).length;

  var filas=FPAGO.map(function(f){
    return'<div class="cierre-row"><span>'+f.emoji+' '+f.label+'</span><span style="color:'+f.color+';font-weight:700">'+fmt(porFP[f.id]||0)+'</span></div>';
  }).join('');

  modal1('<div style="text-align:center;margin-bottom:16px">'
    +'<div style="font-size:28px">🔒</div>'
    +'<div style="font-size:18px;font-weight:900;color:var(--gold)">Cierre de turno</div>'
    +'<div style="color:var(--muted);font-size:12px">'+todayStr()+'</div></div>'
    +(mesasOcup>0?'<div class="alert-box alert-red mb12">⚠️ Hay '+mesasOcup+' mesa(s) con pedidos abiertos. Se recomienda cobrarlas antes del cierre.</div>':'')
    +'<div class="cierre-card">'
    +'<div class="cierre-row"><span>Caja inicial</span><span style="color:var(--gold);font-weight:700">'+fmt(cajaHoy.cajaInicial)+'</span></div>'
    +'<div class="cierre-row"><span>Total ventas</span><span style="color:#22c55e;font-weight:700">'+fmt(totalV)+'</span></div>'
    +'<div class="cierre-row"><span>Total gastos</span><span style="color:#ef4444;font-weight:700">'+fmt(totalG)+'</span></div>'
    +filas
    +'<div class="cierre-total"><span>Utilidad bruta</span><span style="color:'+(utilidad>=0?'#22c55e':'#ef4444')+'">'+fmt(utilidad)+'</span></div>'
    +'</div>'
    +'<div style="color:var(--muted);font-size:12px;margin-bottom:14px;text-align:center">¿Confirmas el cierre del día? Esta acción guarda el resumen en el historial.</div>'
    +'<div style="display:flex;gap:10px">'
    +'<button class="btn btn-outline btn-full" onclick="closeModal1()">Cancelar</button>'
    +'<button class="btn btn-gold btn-full" onclick="confirmarCierre()">🔒 Confirmar cierre</button>'
    +'</div>');
}

function confirmarCierre(){
  var hoyV=ventasTurno();
  var hoyG=gastosTurno();
  var totalV=hoyV.reduce(function(a,v){return a+v.total;},0);
  var totalG=hoyG.reduce(function(a,g){return a+g.valor;},0);
  var porFP={};
  hoyV.forEach(function(v){
    if(v.pagos&&v.pagos.length){
      v.pagos.forEach(function(p){porFP[p.fp]=(porFP[p.fp]||0)+p.monto;});
    } else {
      porFP[v.fp]=(porFP[v.fp]||0)+v.total;
    }
  });
  // Descontar gastos por forma de pago
  var gastosPorFP={};
  hoyG.forEach(function(g){
    var gfp=g.fp||'efectivo';
    gastosPorFP[gfp]=(gastosPorFP[gfp]||0)+g.valor;
    porFP[gfp]=(porFP[gfp]||0)-g.valor; // neto por FP
  });
  var cierre={
    id:'c'+Date.now(),ts:Date.now(),
    turnoInicio:turnoInicio,
    turnoFin:Date.now(),
    cajaInicial:cajaHoy.cajaInicial,
    ventas:totalV,gastos:totalG,
    porFP:porFP,gastosPorFP:gastosPorFP,
    utilidad:cajaHoy.cajaInicial+totalV-totalG,
    numVentas:hoyV.length,numGastos:hoyG.length,
    uid:usuarioActivo.id
  };
  fbPush('cierres',cierre);
  // Nueva caja = caja anterior + neto por forma de pago (ventas - gastos)
  var nuevaCajaInicial = cajaHoy.cajaInicial + totalV - totalG;
  var nuevaCaja = {cajaInicial: Math.max(0, nuevaCajaInicial)};
  FPAGO.forEach(function(f){
    var ini = cajaHoy['ini_'+f.id]||0;
    var neto = (porFP[f.id]||0); // ya tiene gastos descontados
    nuevaCaja['ini_'+f.id] = Math.max(0, ini + neto);
  });
  cajaHoy = nuevaCaja;
  turnoInicio=Date.now();
  fbSet('cajaHoy',cajaHoy);
  fbSet('turnoInicio',turnoInicio);
  closeModal1();render();
  alert('Cierre de turno guardado ✓\nCaja inicial nuevo turno: '+fmt(cajaHoy.cajaInicial));
}

function verCierre(id){
  var c=cierres.find(function(x){return x.id===id;});if(!c)return;
  var uid=usuarios.find(function(u){return u.id===c.uid;});
  var filas=FPAGO.map(function(f){
    var ventas=(c.porFP&&c.porFP[f.id])||0;
    var gastos2=(c.gastosPorFP&&c.gastosPorFP[f.id])||0;
    var neto=ventas-gastos2;
    return'<div class="cierre-row"><span>'+f.emoji+' '+f.label+'</span>'
      +'<span style="color:'+f.color+';font-weight:700">'+fmt(neto)
      +(gastos2?'<span style="color:#ef4444;font-size:10px;margin-left:4px">(-'+fmt(gastos2)+')</span>':'')
      +'</span></div>';
  }).join('');
  var turnoStr=c.turnoInicio?('Turno: '+fmtDT(c.turnoInicio)+' → '+fmtTime(c.turnoFin||c.ts)):'';
  modal2('<div style="text-align:center;margin-bottom:14px">'
    +'<div style="font-size:24px">📋</div>'
    +'<div style="font-size:16px;font-weight:900;color:var(--gold)">Cierre de turno</div>'
    +'<div style="color:var(--muted);font-size:12px">'+turnoStr+'</div>'
    +'<div style="color:var(--muted);font-size:11px">'+(uid?uid.emoji+' '+esc(uid.nombre):'')+'</div></div>'
    +'<div class="cierre-card">'
    +'<div class="cierre-row"><span>Caja inicial</span><span style="color:var(--gold);font-weight:700">'+fmt(c.cajaInicial)+'</span></div>'
    +'<div class="cierre-row"><span>Total ventas ('+c.numVentas+')</span><span style="color:#22c55e;font-weight:700">'+fmt(c.ventas)+'</span></div>'
    +'<div class="cierre-row"><span>Total gastos ('+c.numGastos+')</span><span style="color:#ef4444;font-weight:700">'+fmt(c.gastos)+'</span></div>'
    +filas

    +'</div>'
    +'<div style="display:flex;gap:10px;margin-top:4px">'
    +'<button class="btn btn-blue btn-full" onclick="exportarCierre(\''+id+'\')">📊 Exportar Excel</button>'
    +'<button class="btn btn-outline btn-full" onclick="closeModal2()">Cerrar</button>'
    +'</div>');
}

function renderEmpleados(){
  var esAdmin=usuarioActivo&&usuarioActivo.rol==='admin';

  // Compute saldo de prestamos por empleado
  function saldoPrestamo(empId){
    return movEmpleados.filter(function(m){return m.empId===empId;}).reduce(function(s,m){
      if(m.tipo==='prestamo')return s+m.valor;
      if(m.tipo==='abono')return s-m.valor;
      return s;
    },0);
  }

  var empCards=empleados.filter(function(e){return e.activo!==false;}).map(function(e){
    var saldo=saldoPrestamo(e.id);
    var totalPagado=movEmpleados.filter(function(m){return m.empId===e.id&&m.tipo==='salario';}).reduce(function(s,m){return s+m.valor;},0);
    return'<div class="card" style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
        +'<div>'
          +'<div style="font-weight:800;font-size:15px">👷 '+esc(e.nombre)+'</div>'
          +'<div style="color:var(--muted);font-size:12px">'+esc(e.cargo||'Sin cargo')+'</div>'
        +'</div>'
        +'<div style="text-align:right">'
          +(saldo>0?'<div style="color:#ef4444;font-weight:700;font-size:13px">Debe: '+fmt(saldo)+'</div>':'<div style="color:#22c55e;font-size:12px">Sin deudas</div>')
        +'</div>'
      +'</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
        +'<button data-act="emp-mov" data-emp="'+e.id+'" data-tipo="prestamo" style="flex:1;min-width:80px;background:#ef444418;color:#ef4444;border:1px solid #ef444433;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer">💸 Préstamo</button>'
        +(saldo>0?'<button data-act="emp-mov" data-emp="'+e.id+'" data-tipo="abono" style="flex:1;min-width:80px;background:#22c55e18;color:#22c55e;border:1px solid #22c55e33;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer">✅ Abono</button>':'')
        +'<button data-act="emp-mov" data-emp="'+e.id+'" data-tipo="salario" style="flex:1;min-width:80px;background:var(--accent)18;color:var(--accent);border:1px solid var(--accent)33;border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer">💰 Salario</button>'
        +'<button data-act="emp-mov" data-emp="'+e.id+'" data-tipo="otro" style="flex:1;min-width:80px;background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer">+ Otro</button>'
      +'</div>'
      // Historial movimientos
      +(function(){
        var movs=movEmpleados.filter(function(m){return m.empId===e.id;}).sort(function(a,b){return b.ts-a.ts;}).slice(0,5);
        if(!movs.length)return'';
        return'<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:8px">'
          +movs.map(function(m){
            var icon=m.tipo==='prestamo'?'💸':(m.tipo==='abono'?'✅':(m.tipo==='salario'?'💰':'📌'));
            var col=m.tipo==='abono'?'#22c55e':(m.tipo==='prestamo'?'#ef4444':'var(--muted)');
            var fp=FPAGO.find(function(x){return x.id===m.fp;});
            return'<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px">'
              +'<span style="color:var(--muted)">'+icon+' '+m.tipo.charAt(0).toUpperCase()+m.tipo.slice(1)+(m.nota?' · '+esc(m.nota):'')+' <span style="opacity:.6">'+fmtTime(m.ts)+'</span></span>'
              +'<span style="color:'+col+';font-weight:700">'+fmt(m.valor)+(fp?' '+fp.emoji:'')+'</span>'
              +(esAdmin?'<button data-act="emp-delmov" data-id="'+m.id+'" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:13px;margin-left:6px">✕</button>':'')
              +'</div>';
          }).join('')
        +'</div>';
      })()
    +'</div>';
  }).join('');

  // Totales del turno (movimientos que son gasto)
  var movTurno=movEmpleados.filter(function(m){return m.ts>=turnoInicio&&(m.tipo==='prestamo'||m.tipo==='salario'||m.tipo==='otro');});
  var totalEgresos=movTurno.reduce(function(s,m){return s+m.valor;},0);

  return'<div>'
    +'<div class="flex-between mb12">'
      +'<div style="font-weight:800;font-size:16px">👷 Empleados</div>'

  +'</div>';
}

function guardarEmpleado(){
  var nombre=((document.getElementById('emp-nombre')||{}).value||'').trim();

  if(!nombre){alert('Escribe el nombre.');return;}

function abrirMovEmpleado(empId,tipo){
  var emp=empleados.find(function(e){return e.id===empId;});
  if(!emp)return;
  var titulos={prestamo:'💸 Préstamo a',abono:'✅ Abono de',salario:'💰 Pago salario a',otro:'📌 Otro movimiento'};
  var fpOpts=FPAGO.map(function(f){return'<option value="'+f.id+'">'+f.emoji+' '+f.label+'</option>';}).join('');
  modal1('<div style="font-weight:800;font-size:16px;margin-bottom:4px">'+(titulos[tipo]||tipo)+'</div>'
    +'<div style="color:var(--muted);font-size:13px;margin-bottom:14px">'+esc(emp.nombre)+'</div>'
    +'<div style="margin-bottom:10px"><div style="color:var(--muted);font-size:11px;margin-bottom:3px">Valor (COP) *</div>'
    +'<input class="inp" id="mov-valor" type="number" placeholder="0" inputmode="numeric"/></div>'
    +'<div style="margin-bottom:10px"><div style="color:var(--muted);font-size:11px;margin-bottom:3px">Forma de pago</div>'
    +'<select class="inp" id="mov-fp">'+fpOpts+'</select></div>'
    +(tipo==='otro'?'<div style="margin-bottom:10px"><div style="color:var(--muted);font-size:11px;margin-bottom:3px">Concepto</div><input class="inp" id="mov-nota" placeholder="Ej: Bono, descuento..."/></div>':'<div style="margin-bottom:10px"><div style="color:var(--muted);font-size:11px;margin-bottom:3px">Nota (opcional)</div><input class="inp" id="mov-nota" placeholder=""/></div>')
    +'<button class="btn btn-green btn-full" onclick="guardarMovEmpleado(\''+empId+'\',\''+tipo+'\')">Guardar</button>');
}

function guardarMovEmpleado(empId,tipo){
  var emp=empleados.find(function(e){return e.id===empId;});
  if(!emp)return;
  var valor=parseInt((document.getElementById('mov-valor')||{}).value)||0;
  var fp=(document.getElementById('mov-fp')||{}).value||'efectivo';
  var nota=((document.getElementById('mov-nota')||{}).value||'').trim();
  if(!valor||valor<=0){alert('Escribe el valor.');return;}
  var mov={id:'me'+Date.now(),ts:Date.now(),empId:empId,tipo:tipo,valor:valor,fp:fp,nota:nota,uid:usuarioActivo.id,uidNombre:usuarioActivo.nombre};
  movEmpleados.push(mov);
  var r=ref('movEmpleados');if(r)r.push(mov);else fbSet('movEmpleados',movEmpleados);

  // Préstamo, salario y otro = gasto automático (sale dinero). Abono NO (entra dinero).
  if(tipo==='prestamo'||tipo==='salario'||tipo==='otro'){
    var conceptos={prestamo:'Préstamo a '+emp.nombre,salario:'Salario '+emp.nombre,otro:(nota||'Movimiento')+' - '+emp.nombre};
    var g={id:'g'+Date.now(),ts:Date.now(),concepto:conceptos[tipo],categoria:'Personal',valor:valor,notas:'Auto desde Empleados',fp:fp,empId:empId,uid:usuarioActivo.id,uidNombre:usuarioActivo.nombre};
    gastos.push(g);
    var rg=ref('gastos');if(rg)rg.push(g);else fbSet('gastos',gastos);
  }

  closeModal1();
  var msgs={prestamo:'💸 Préstamo registrado',abono:'✅ Abono registrado',salario:'💰 Salario pagado',otro:'📌 Movimiento registrado'};
  showToast((msgs[tipo]||'Guardado')+'<br><span style="font-size:12px;opacity:.85">'+esc(emp.nombre)+' · '+fmt(valor)+'</span>',tipo==='abono'?'#22c55e':'#ef4444');
  render();
}

function borrarMovEmpleado(movId){
  if(!confirm('¿Eliminar este movimiento? (No elimina el gasto asociado)'))return;
  movEmpleados=movEmpleados.filter(function(m){return m.id!==movId;});
  fbSet('movEmpleados',movEmpleados);
  render();
}

function showToast(msg,color){
  var t=document.getElementById('app-toast');
  if(!t){
    t=document.createElement('div');
    t.id='app-toast';
    t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:#1a1a22;border:2px solid '+(color||'#22c55e')+';color:#fff;padding:12px 24px;border-radius:12px;font-weight:700;font-size:14px;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .3s cubic-bezier(.16,1,.3,1);opacity:0;max-width:90vw;text-align:center';
    document.body.appendChild(t);
  }
  t.style.borderColor=color||'#22c55e';
  t.innerHTML=msg;
  t.style.transform='translateX(-50%) translateY(0)';
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){
    t.style.transform='translateX(-50%) translateY(-80px)';
    t.style.opacity='0';
  },1800);
}

function agregarConsumoSocio(pid,esCubeta,cantidad){
  var p=menu.find(function(m){return m.id===pid;});
  if(!p)return;
  var qty=cantidad||1;
  var precioBase=esCubeta?(p.cubeta||p.precio*5):p.precio;
  var precioSocio=Math.round(precioBase*0.9);
  var nombre=(esCubeta?'🪣 Cubetazo ':'')+''+p.nombre;
  var item={pid:pid,qty:qty,cubeta:!!esCubeta,nombre:nombre,emoji:p.emoji,precioBase:precioBase,precioSocio:precioSocio};
  var consumo={id:'soc_'+Date.now(),ts:Date.now(),socio:_socioActivo,items:[item],total:precioSocio*qty};
  consumoSocios.push(consumo);
  var r=ref('consumoSocios');
  if(r)r.push(consumo); else fbSet('consumoSocios',consumoSocios);
  // Descontar stock del producto
  var cantStock=esCubeta?qty*5:qty;
  var antesS=parseInt(p.stock); if(isNaN(antesS))antesS=0;
  p.stock=Math.max(0,antesS-cantStock);
  // Descontar receta si tiene
  if(p.receta&&p.receta.length){
    p.receta.forEach(function(ri){
      var ingP=menu.find(function(m){return Number(m.id)===Number(ri.pid);});
      if(ingP){var a=parseInt(ingP.stock);if(isNaN(a))a=0;ingP.stock=Math.max(0,a-(ri.cantidad*qty));}
      else{var ingI=ingredientes.find(function(i){return Number(i.id)===Number(ri.pid);});if(ingI){var ai=parseInt(ingI.stock);if(isNaN(ai))ai=0;ingI.stock=Math.max(0,ai-(ri.cantidad*qty));guardarIngredientes();}}
    });
  }
  var mo={};menu.forEach(function(m){mo[m.id]=m;});fbSet('menu',mo);
  var totalSocio=consumoSocios.filter(function(c){return c.socio===_socioActivo;}).reduce(function(a,c){return a+c.total;},0);
  var colorS=_socioActivo==='CARLOS'?'#38bdf8':'#a855f7';
  showToast('✅ '+qty+'× '+p.emoji+' '+esc(nombre)+' → '+_socioActivo+'<br><span style="font-size:12px;opacity:.8">Total '+_socioActivo+': '+fmt(totalSocio)+'</span>',colorS);
  render();
}

function agregarConsumoSocioCombo(cbId){
  var cb=combos.find(function(c){return c.id===cbId;});
  if(!cb)return;
  var precioSocio=Math.round(cb.precio*0.9);
  var item={pid:'combo_'+cbId,qty:1,nombre:'🎁 '+cb.nombre,emoji:cb.emoji,precioBase:cb.precio,precioSocio:precioSocio};
  var consumo={id:'soc_'+Date.now(),ts:Date.now(),socio:_socioActivo,items:[item],total:precioSocio};
  consumoSocios.push(consumo);
  var r=ref('consumoSocios');
  if(r)r.push(consumo); else fbSet('consumoSocios',consumoSocios);
  // Descontar stock de ingredientes del combo
  (cb.ingredientes||[]).forEach(function(ing){
    var cant=ing.cantidad||1;
    if(ing.prodId!=null){
      var pp=menu.find(function(m){return Number(m.id)===Number(ing.prodId);});
      if(pp){var a=parseInt(pp.stock);if(isNaN(a))a=0;pp.stock=Math.max(0,a-cant);}
    }
    if(ing.ingId!=null){
      var ii=ingredientes.find(function(i){return Number(i.id)===Number(ing.ingId);});
      if(ii){var ai=parseInt(ii.stock);if(isNaN(ai))ai=0;ii.stock=Math.max(0,ai-cant);guardarIngredientes();}
    }
  });
  var moc={};menu.forEach(function(m){moc[m.id]=m;});fbSet('menu',moc);
  var totalSocioC=consumoSocios.filter(function(c){return c.socio===_socioActivo;}).reduce(function(a,c){return a+c.total;},0);
  var colorSC=_socioActivo==='CARLOS'?'#38bdf8':'#a855f7';
  showToast('✅ 🎁 '+esc(cb.nombre)+' → '+_socioActivo+'<br><span style="font-size:12px;opacity:.8">Total '+_socioActivo+': '+fmt(totalSocioC)+'</span>',colorSC);
  render();
}

function cerrarConsumoSocios(){
  var total=consumoSocios.reduce(function(a,c){return a+c.total;},0);
  if(!confirm('¿Confirmas el cierre mensual de socios? Total: '+fmt(total)+'. Esto borrará todos los consumos.'))return;
  // Save cierre record
  var cierreSocios={id:'cs_'+Date.now(),ts:Date.now(),total:total,items:consumoSocios.length,uid:usuarioActivo.id};
  var r=ref('cierresSocios');
  if(r)r.push(cierreSocios);
  // Reset
  consumoSocios=[];
  var rs=ref('consumoSocios');
  if(rs)rs.set(null); else fbSet('consumoSocios',null);
  render();
  alert('Cierre mensual guardado. Total: '+fmt(total));
}

function selForma(f){

function guardarMesa(id){
  var num=parseInt((document.getElementById('em-num')||{}).value)||1;
  var cap=parseInt((document.getElementById('em-cap')||{}).value)||4;
  var nombre=((document.getElementById('em-nombre')||{}).value||'').trim()||('Mesa '+num);
  if(id===null){var maxId=0;mesas.forEach(function(m){if(m.id>maxId)maxId=m.id;});mesas.push({id:maxId+1,num:num,nombre:nombre,zona:zonaActual,cap:cap,x:20,y:20,forma:_formaSel,ori:_oriSel});}
  else{var m=mesas.find(function(m){return m.id===id;});if(m){m.num=num;m.nombre=nombre;m.cap=cap;m.forma=_formaSel;m.ori=_oriSel;}}
  fbSet('mesas',mesasObj());closeModal1();render();
}
function eliminarMesa(id){
  if(!confirm('¿Eliminar esta mesa?'))return;
  mesas=mesas.filter(function(m){return m.id!==id;});
  delete pedidos[id];if(mesaActiva&&mesaActiva.id===id)mesaActiva=null;
  fbSet('mesas',mesasObj());closeModal1();render();
}
